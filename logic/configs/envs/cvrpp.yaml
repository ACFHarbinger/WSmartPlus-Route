# @package _global_
# =============================================================================
# Capacitated Vehicle Routing Problem with Profits (CVRPP) Configuration
# =============================================================================
# Waste-collecting routing WITH vehicle capacity constraints.
#
# Combines:
#   - VRPP: Waste/profit collection objective
#   - CVRP: Capacity constraints
#
# Realistic variant where vehicle has limited capacity and must return
# to depot to empty before continuing collection.
#
# Benchmark: Standard OR problem for testing capacity-aware algorithms.
# =============================================================================

env:
  name: "cvrpp" # Environment identifier
  mean: 0.0
  variance: 0.0

  # =============================================================================
  # Capacity Constraint
  # =============================================================================
  capacity:
    100.0 # Normalized vehicle capacity.
    # Waste values typically sum to >capacity, forcing selective collection.
    # Range: 0.5-2.0. Higher = less constrained routing.

  # ===========================================================================
  # Curriculum Learning
  # ===========================================================================
  # The first entry is also used for single-stage training.
  # Each entry may include a 'reward:' block to override objective weights.
  curriculum_graphs:
    - num_loc: 50
      area: "riomaior"
      waste_type: "plastic"
      n_days: 31
      n_samples: 12800
      start_day: 0

      # =========================================================================
      # Objective Function Weights
      # =========================================================================
      # Objective: maximize (waste_weight × Σ wastes) - (cost_weight × total_distance)
      # Subject to: vehicle capacity constraints
      reward:
        cost_weight: 1.0      # Weight for travel distance.
        waste_weight: 1.0     # Weight for waste collection.
        overflow_penalty: 1.0 # Penalty factor for overflows.

  # ===========================================================================
  # Evaluation Graphs
  # ===========================================================================
  # Each entry may include a 'reward:' block to evaluate under different weights.
  eval_graphs: []
