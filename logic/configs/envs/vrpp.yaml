  #  distance_method: "gmaps"
  #  dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
  #  load_dataset: "data/datasets/vrpp/vrpp50_gamma3_val_time100_seed42.td"
  #  start_day: 0
  #  n_days: 7
  #  reward:
  #    waste_weight: 1.0
  #    cost_weight: 2.0

  - num_loc: 100
    n_samples: 512
    area: "riomaior"
    waste_type: "plastic"
    focus_size: 512
    focus_graph: "graphs_100V_1N_plastic.json"
    vertex_method: "mmn"
    distance_method: "gmaps"
    dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
    load_dataset: "data/datasets/vrpp/vrpp100_emp_val_time7_seed42.td"
    start_day: 0
    n_days: 7
    reward:
      waste_weight: 1.0
      cost_weight: 1.0

  - num_loc: 170
    n_samples: 512
    area: "riomaior"
    waste_type: "plastic"
    focus_size: 512
    focus_graph: "graphs_170V_1N_plastic.json"
    vertex_method: "mmn"
    distance_method: "gmaps"
    dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
    load_dataset: "data/datasets/vrpp/vrpp170_emp_val_time7_seed42.td"
    start_day: 0
    n_days: 7
    reward:
      waste_weight: 1.0
      cost_weight: 2.5
