# =============================================================================
# Vehicle Routing Problem with Profits (VRPP) Environment Configuration
# =============================================================================
# Classic waste-collecting routing problem:
#   - Each node has a profit/waste
#   - No capacity constraints (uncapacitated)
#   - Maximize: total_waste - travel_cost
#
# Benchmark problem for testing neural constructive heuristics.
# =============================================================================

name: "vrpp" # Environment identifier

# ===========================================================================
# Curriculum Learning
# ===========================================================================
# The first entry is also used for single-stage training.
# Sequential training stages with warm-started weights. Remove entries to
# reduce to single-stage. Each entry may include a 'reward:' block to
# override objective weights for that stage.
curriculum_graphs:
  #- num_loc: 50
  #  n_samples: 12800
  #  area: "riomaior"
  #  waste_type: "plastic"
  #  vertex_method: "mmn"
  #  distance_method: "gmaps"
  #  focus_size: 12800
  #  focus_graph: "graphs_50V_1N_plastic.json"
  #  start_day: 0
  #  n_days: 31
  #  dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
  #  load_dataset: "data/datasets/vrpp/vrpp50_gamma3_time100_seed42.td"
  #  reward:
  #    waste_weight: 1.0
  #    cost_weight: 2.0

  - num_loc: 100
    n_samples: 12800
    area: "riomaior"
    waste_type: "plastic"
    vertex_method: "mmn"
    distance_method: "gmaps"
    focus_size: 12800
    focus_graph: "graphs_100V_1N_plastic.json"
    start_day: 0
    n_days: 100
    dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
    load_dataset: "data/datasets/vrpp/vrpp100_emp_time100_seed42.td"
    # Objective: maximize (waste_weight × Σ wastes) - (cost_weight × total_distance)
    reward:
      waste_weight: 1.0 # Weight for node wastes/rewards. Typical range: 0.5-2.0.
      cost_weight: 2.5 # High cost discourages voluntary collection; mandatory bins force routing.

  - num_loc: 170
    n_samples: 12800
    area: "riomaior"
    waste_type: "plastic"
    vertex_method: "mmn"
    distance_method: "gmaps"
    focus_size: 12800
    focus_graph: "graphs_170V_1N_plastic.json"
    start_day: 0
    n_days: 100
    dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
    load_dataset: "data/datasets/vrpp/vrpp170_emp_time100_seed42.td"
    reward:
      waste_weight: 1.0
      cost_weight: 2.5

# ===========================================================================
# Evaluation Graphs
# ===========================================================================
# One validation dataset per entry. When empty ([]), falls back to using the
# training env's generator with n_samples from curriculum_graphs[0].
# Each entry may include a 'reward:' block for per-graph eval objectives.
eval_graphs:
  #- num_loc: 50
  #  n_samples: 512
  #  area: "riomaior"
  #  waste_type: "plastic"
  #  focus_size: 512
  #  focus_graph: "graphs_50V_1N_plastic.json"
