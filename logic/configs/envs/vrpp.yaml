# @package _global_
# =============================================================================
# Vehicle Routing Problem with Profits (VRPP) Environment Configuration
# =============================================================================
# Classic waste-collecting routing problem:
#   - Each node has a profit/waste
#   - No capacity constraints (uncapacitated)
#   - Maximize: total_waste - travel_cost
#
# Benchmark problem for testing neural constructive heuristics.
# =============================================================================

env:
  name: "vrpp" # Environment identifier

  # ===========================================================================
  # Curriculum Learning
  # ===========================================================================
  # Sequential training stages with warm-started weights. Leave empty ([]) to disable.
  curriculum_graphs:
    - num_loc: 50
      n_samples: 12800
      area: "riomaior"
      waste_type: "plastic"
      focus_size: 12800
      focus_graph: "graphs_50V_1N_plastic.json"
      start_day: 0
      n_days: 31
      dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
      load_dataset: "data/datasets/vrpp/vrpp50_gamma3_time100_seed42.td"
    - num_loc: 100
      n_samples: 12800
      area: "riomaior"
      waste_type: "plastic"
      focus_size: 12800
      focus_graph: "graphs_100V_1N_plastic.json"
      start_day: 0
      n_days: 31
      dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
      load_dataset: "data/datasets/vrpp/vrpp100_gamma3_time100_seed42.td"
    - num_loc: 170
      n_samples: 12800
      area: "riomaior"
      waste_type: "plastic"
      focus_size: 12800
      focus_graph: "graphs_170V_1N_plastic.json"
      start_day: 0
      n_days: 31
      dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
      load_dataset: "data/datasets/vrpp/vrpp170_gamma3_time100_seed42.td"

  # ===========================================================================
  # Evaluation Graphs
  # ===========================================================================
  # One validation dataset per entry. When empty ([]), uses env.graph.n_samples.
  eval_graphs:
    - num_loc: 50
      n_samples: 512
      area: "riomaior"
      waste_type: "plastic"
      focus_size: 512
      focus_graph: "graphs_50V_1N_plastic.json"
      dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
      start_day: 0
      n_days: 7
    - num_loc: 100
      n_samples: 512
      area: "riomaior"
      waste_type: "plastic"
      focus_size: 512
      focus_graph: "graphs_100V_1N_plastic.json"
      dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
      start_day: 0
      n_days: 7
    - num_loc: 170
      n_samples: 512
      area: "riomaior"
      waste_type: "plastic"
      focus_size: 512
      focus_graph: "graphs_170V_1N_plastic.json"
      dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
      start_day: 0
      n_days: 7

  # =============================================================================
  # Objective Function Weights
  # =============================================================================
  # Objective: maximize (waste_weight × Σ wastes) - (cost_weight × total_distance)
  reward:
    waste_weight:
      1.0 # Weight for node wastes/rewards. (waste_weight in user's request)
      # Higher = prioritize collecting high-value nodes.
      # Typical range: 0.5-2.0.

    cost_weight:
      1.0 # Weight for travel distance penalty.
      # Higher = prioritize shorter routes.
      # Typical range: 0.5-2.0.
      #
      # Balance Examples:
      #   - waste_weight=1.0, cost_weight=1.0: Balanced (default)
      #   - waste_weight=2.0, cost_weight=1.0: Prioritize collecting nodes
      #   - waste_weight=1.0, cost_weight=2.0: Prioritize short routes
