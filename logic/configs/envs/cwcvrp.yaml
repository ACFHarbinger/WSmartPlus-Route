# =============================================================================
# Capacitated Waste Collection VRP (CWCVRP) Environment Configuration
# =============================================================================
# Realistic waste collection routing with:
#   - Vehicle capacity constraints
#   - Multi-day temporal dynamics
#   - Overflow penalties
#   - Real-world geographic areas
#
# This is the DEFAULT environment for WSmart-Route.
# =============================================================================

name: "cwcvrp" # Environment identifier
mean: 0.0
variance: 0.0

# ===========================================================================
# Curriculum Learning
# ===========================================================================
# The first entry is also used for single-stage training.
# Each entry may include a 'reward:' block to override objective weights.
curriculum_graphs:
  - num_loc: 100
    area: "riomaior"
    waste_type: "plastic"
    distance_method: "gmaps"
    vertex_method: "mmn"
    edge_threshold: 1.0
    edge_method: "knn"
    n_days: 31
    n_samples: 12800
    start_day: 0

    # =========================================================================
    # Objective Function Weights
    # =========================================================================
    # Objective: maximize (waste_weight × kg) - (cost_weight × km) - (overflow_penalty × overflows)
    reward:
      cost_weight: 10.0      # Weight for distance penalty. Higher = prioritize shorter routes.
      overflow_penalty: 10.0 # Overflow penalty weight. Higher = prevent overflows more strongly.
      waste_weight: 10.0     # Collection reward weight. Higher = collect more waste.

# ===========================================================================
# Evaluation Graphs
# ===========================================================================
# Each entry may include a 'reward:' block to evaluate under different weights.
eval_graphs: []
