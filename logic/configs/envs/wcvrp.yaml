# @package _global_
# =============================================================================
# Waste Collection VRP (WCVRP) Environment Configuration
# =============================================================================
# Uncapacitated waste collection routing (no vehicle capacity constraints).
# Simpler than CWCVRP - useful for baseline comparisons.
#
# Differences from CWCVRP:
#   - No capacity constraints (vehicle can collect unlimited waste)
#   - Simpler for algorithm development and testing
#   - Less realistic but faster to train
# =============================================================================

env:
  name: "wcvrp" # Environment identifier
  mean: 0.0
  variance: 0.0

  # ===========================================================================
  # Curriculum Learning
  # ===========================================================================
  # The first entry is also used for single-stage training.
  # Each entry may include a 'reward:' block to override objective weights.
  curriculum_graphs:
    - num_loc: 50
      area: "riomaior"
      waste_type: "plastic"
      distance_method: "gmaps"
      vertex_method: "mmn"
      edge_threshold: 1.0
      edge_method: "knn"
      n_days: 31
      n_samples: 12800
      start_day: 0

      # =========================================================================
      # Objective Function Weights
      # =========================================================================
      reward:
        cost_weight: 1.0       # Distance penalty weight
        overflow_penalty: 10.0 # Overflow penalty weight
        waste_weight: 10.0     # Collection reward weight

  # ===========================================================================
  # Evaluation Graphs
  # ===========================================================================
  # Each entry may include a 'reward:' block to evaluate under different weights.
  eval_graphs: []
