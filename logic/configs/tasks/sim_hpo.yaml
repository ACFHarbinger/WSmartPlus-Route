# @package _global_
# =============================================================================
# Simulation Policy Hyperparameter Optimization (Sim HPO) Task Configuration
# =============================================================================
# Configuration for automated hyperparameter search for simulation policies.
# Used by: python main.py hpo_sim tasks=hpo_sim
# =============================================================================

defaults:
  - _self_
  - override /tracking: hpo

# =============================================================================
# General Configuration
# =============================================================================
seed: 42
task: "hpo_sim"

# =============================================================================
# Sim HPO Configuration
# =============================================================================
hpo_sim:
  method: "tpe" # tpe, random, grid, hyperband
  metric: "profit"
  n_trials: 20
  num_workers: 1
  policy_name: "alns"

  graph:
    num_loc: 20
    area: "riomaior"
    n_days: 7
    n_samples: 1

  # Search Space (can be overridden from CLI)
  # ===========================================================================
  # PATH RESOLUTION RULES:
  # 1. ABSOLUTE: If a key contains a dot (e.g., "sim.days"), it is treated as a
  #    direct path within the root Hydra config.
  # 2. RELATIVE: If a key has no dots (e.g., "max_iterations"), it defaults to:
  #    sim.full_policies.0.${hpo_sim.policy_name}.[key]
  # ===========================================================================
  search_space:
    # Relative parameter (ALNS max iterations)
    max_iterations:
      type: int
      low: 500
      high: 5000

    # Absolute parameter (Simulation duration)
    "sim.days":
      type: int
      low: 1
      high: 14
      step: 1

    # Absolute parameter (Vehicle capacity or count)
    "sim.n_vehicles":
      type: int
      low: 1
      high: 5
