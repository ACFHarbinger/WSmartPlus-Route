# @package _global_
# =============================================================================
# Training Task Configuration
# =============================================================================
# Configuration for reinforcement learning training with PyTorch Lightning.
# Used by: python main.py train
#
# Key Features:
#   - Adaptive Imitation Learning (IL → RL transition)
#   - Multi-day temporal training for WCVRP
#   - mandatory bin selection strategies
#   - Lightning-based distributed training
# =============================================================================

defaults:
  - /models/policies/hgs_alns@rl.imitation.policy_config
  - /models/policies/hgs_alns@rl.adaptive_imitation.policy_config
  - /envs@train.env: vrpp
  - _self_
  - override /tracking: train

# =============================================================================
# General Configuration
# =============================================================================
seed: 42 # Random seed for reproducibility
start: 0 # Starting epoch (for resuming training)

# =============================================================================
# Training Settings
# =============================================================================
train:
  train_time: true # Enable multi-day temporal training (for WCVRP)

  data_distribution: "emp" # Waste generation distribution. Options: gamma1, gamma2, uniform, beta
  seed: 42 # Random seed for dataset generation

  batch_size: 64 # Training batch size. Reduce if OOM errors occur.
  eval_batch_size: 64 # Validation batch size (can be larger than train)

  model_weights_path: "model_weights" # Directory for checkpoints
  final_model_path: "assets/model_weights/${train.env.name}${train.env.curriculum_graphs[0].num_loc}_${train.env.curriculum_graphs[0].area}_${train.env.curriculum_graphs[0].waste_type}/${train.data_distribution}/${train.policy.model.name}${train.policy.model.encoder.type}${train.policy.model.temporal_horizon}/epoch-${train.env.curriculum_graphs[0].n_days}.pt"
  # Hardware / Performance
  precision: "16-mixed" # Training precision (32, 16-mixed, bf16-mixed)
  devices: "auto" # Number of GPUs to use (1, 2, 'auto')
  strategy: "auto" # Distributed strategy ('auto', 'ddp', 'deepspeed')

  # DataLoader optimization
  persistent_workers: true # Disable to ensure workers see updated dataset each epoch
  pin_memory: false # Pin memory for faster GPU transfer
  reload_dataloaders_every_n_epochs: 1 # Reload data every epoch so workers get updated waste

  policy:
    model:
      name: "am" # Model architecture
      temporal_horizon: 0 # Temporal lookahead (0 for static, 7+ for WCVRP)

      # Encoder Architecture
      encoder:
        type: "gat" # Graph encoder type (gat, gcn, tgc, mlp)
        embed_dim: 128 # Node embedding dimension
        hidden_dim: 512 # Feed-forward hidden size
        n_layers: 3 # Number of encoder transformer layers
        n_heads: 8 # Number of attention heads
        n_sublayers: 1 # Sublayers per encoder block
        dropout: 0.1 # Dropout probability
        spatial_bias: false # Add learnable spatial distance bias
        connection_type: "residual" # Skip connection type (residual, static_hyper, dynamic_hyper)
        hyper_expansion: 4 # For connection_type="hyper"
        aggregation_node: "sum" # Feature aggregation (sum, mean, max)
        aggregation_graph: "avg" # Graph pooling (avg, max, sum)

        # Normalization & Activation
        normalization:
          norm_type: "layer" # batch, layer, instance, group
          learn_affine: true
          track_stats: false
          epsilon: 1e-5
          momentum: 0.1
          n_groups: 1
          k_lrnorm: 1.0

        activation:
          name: "gelu" # relu, gelu, swish, mish, elu
          param: 1.0
          threshold: 6.0
          replacement_value: 6.0
          n_params: 3
          range: [0.125, 0.3333333333333333]

      # Decoder Architecture
      decoder:
        type: "glimpse" # attention, pointer, glimpse
        n_layers: 2 # Number of decoder layers
        n_heads: 8
        n_predictor_layers: 0 # Depth of GRF predictor (TAM)
        dropout: 0.1
        tanh_clipping: 10.0
        mask_logits: true
        connection_type: "residual"

    mandatory_selection:
      strategy: "lookahead" # Default strategy for training

      lookahead:
        current_collection_day: 0

      last_minute:
        threshold: 0.25 # ~25% of nodes (top fill-level quartile); forces ~25 bins per instance

      regular:
        frequency: 3

      service_level:
        confidence_factor: 1.0

      revenue:
        revenue_kg: 1.0
        bin_capacity: 1.0
        revenue_threshold: 0.0

      manager:
        hidden_dim: 128
        lstm_hidden: 64
        history_length: 10
        manager_critical_threshold: 0.9
        manager_weights: null
        device: "cuda"

# =============================================================================
# Optimizer Settings
# =============================================================================
optim:
  optimizer: "rmsprop" # Optimizer type. Options: adam, adamw, rmsprop, sgd
  lr: 0.0001 # Learning rate. Typical range: 1e-5 to 1e-3
  weight_decay: 0.0 # Weight decay (L2 regularization)
  lr_decay: 1.0 # Learning rate decay per epoch (1.0 = no decay)
  lr_min_value: 0.0 # Minimum learning rate for scheduler
  lr_scheduler: "lambda" # LR scheduler. Options: lambda, step, cosine, exponential
  lr_scheduler_kwargs: {} # Additional scheduler arguments

# =============================================================================
# Reinforcement Learning / Algorithm Settings
# =============================================================================
rl:
  algorithm:
    "reinforce" # RL algorithm. Options:
    # - "adaptive_imitation": IL → RL transition
    # - "reinforce": REINFORCE with baseline
    # - "ppo": Proximal Policy Optimization
    # - "imitation": Pure imitation learning

  # Baseline Configuration
  baseline: "exponential" # Baseline type. Options: exponential, rollout, critic, no
  bl_alpha: 0.05 # Exponential baseline moving average weight
  exp_beta: 0.6 # Exponential moving average coefficient
  entropy_weight: 0.05 # Entropy bonus weight — mild exploration to avoid policy collapse

  # Training Stability
  max_grad_norm: 1.0 # Gradient clipping threshold (prevents explosion)
  gamma: 1.0 # Discount factor for future rewards (1.0 = no discounting for episodic tasks)

  # =============================================================================
  # Potential-Based Reward Shaping (PBRS)
  # Reference: Ng, Harada & Russell (1999) — ICML
  # =============================================================================
  # Adds a shaping bonus F(s,a,s') = gamma * Phi(s') - Phi(s) to the training
  # reward to provide denser learning signals without changing the optimal policy.
  #
  # The discount factor (gamma above) is reused — no separate key needed.
  # Phi(s_0) = 0 at reset; Phi(s_final) = collected_waste / max_waste for VRPP.
  #
  # Anti-pattern guard: {phase}/reward always logs R_base (not the shaped value)
  # so val/test metrics are never inflated by the shaping signal.
  use_pbrs: false # Set to true to enable PBRS during training
  pbrs_shaping_weight: 1.0 # Scale factor applied to F before adding to R_base
  pbrs_potential: "vrpp" # Potential function key ('vrpp'; others log a warning)

  # =============================================================================
  # Algorithm-Specific Configurations
  # =============================================================================

  # PPO (Proximal Policy Optimization)
  ppo:
    inner_epochs: 7 # Number of PPO update epochs per batch
    eps_clip: 0.2 # Clipping parameter for PPO objective

  # Imitation Learning
  imitation:
    # Expert policy configuration loaded from defaults: /tasks/policies/rl/hgs_alns
    # Override via CLI: rl.imitation.policy_config@=/tasks/policies/rl/hgs
    # Override params: rl.imitation.policy_config.time_limit=60.0
    # policy_config is populated by defaults list (see top of file)
    loss_fn: "nll" # Loss function. Options: nll, weighted_nll, kl, reverse_kl, js

  # Adaptive Imitation Learning (IL → RL)
  adaptive_imitation:
    # Expert policy configuration loaded from defaults: /tasks/policies/rl/hgs_alns
    # Override via CLI: rl.adaptive_imitation.policy_config@=/tasks/policies/rl/hgs
    # policy_config is populated by defaults list (see top of file)
    il_weight: 1.0 # Initial imitation loss weight (1.0 = pure IL, 0.0 = pure RL)
    il_decay: 0.95 # IL weight decay per epoch (gradual transition to RL)
    patience: 5 # Epochs to wait before decaying IL weight if no improvement
    threshold: 0.0001 # Improvement threshold (lowered from 0.05 due to small reward scale)
    decay_step: 1 # Step size for IL weight decay
    epsilon: 1.0e-6 # Minimum IL weight (prevents complete IL shutdown)
    loss_fn: "weighted_nll" # Loss function. Options: nll, weighted_nll, kl, reverse_kl

  dr_alns:
    max_iterations: 100
    n_destroy_ops: 3
    n_repair_ops: 2

    # PPO Hyperparameters
    lr: 0.0003
    gamma: 0.99
    gae_lambda: 0.95
    clip_epsilon: 0.2
    value_loss_coef: 0.5
    entropy_coef: 0.01
    max_grad_norm: 0.5

    # Training Control
    n_steps_per_epoch: 2048
    batch_size: 64
    inner_epochs: 10
