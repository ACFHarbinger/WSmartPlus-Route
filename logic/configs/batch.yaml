# @package _global_
# =============================================================================
# Batch Task Configuration — WSmart-Route Batch Manager
# =============================================================================
# This is the REFERENCE / TEMPLATE batch config.  Copy this file and customise
# it for your specific experiment.  Pass the path to BatchManager.from_yaml()
# or invoke it via:
#
#     just batch-run batch_cfg=logic/configs/batch/my_experiment.yaml
#
# =============================================================================

# ─── Batch metadata ──────────────────────────────────────────────────────────
name: "example_batch"

# Abort immediately if any job fails (default: false — run all jobs)
fail_fast: false

# Print commands without executing (default: false)
dry_run: false

# ─── Global setup steps (run ONCE before ALL jobs) ───────────────────────────
setup:
  # Example: create a dedicated git branch for the entire batch
  - type: git_branch
    name: "create_experiment_branch"
    args:
      branch_name: "experiment/batch-{{ name }}"
      create: true

  # Example: generate distance matrices for all regions used in the batch
  # - type: gen_dist_matrix
  #   args:
  #     area: figueiradafoz
  #     check_exists: true

  # Example: arbitrary shell command
  # - type: shell
  #   args:
  #     command: "echo 'Batch {{ name }} starting' >> batch.log"

# ─── Global teardown steps (run ONCE after ALL jobs) ─────────────────────────
teardown:
  # Run only if EVERY job succeeded
  - type: create_pr
    name: "open_pr_on_success"
    condition: all_succeeded
    args:
      title: "Batch results: {{ name }}"
      body: "Automated batch run completed successfully."
      base: main
      draft: false

  # Always push results regardless of outcome
  # - type: git_push
  #   condition: always
  #   args:
  #     remote: origin
  #     set_upstream: true

  # Clean up temporary files created for this batch
  # - type: delete_path
  #   condition: always
  #   args:
  #     path: assets/tmp/batch_scratch
  #     missing_ok: true

# ─── Individual runs ─────────────────────────────────────────────────────────
runs:

  # ── Example 1: Concrete single run with explicit overrides ─────────────────
  - task: test_sim
    name: "alns_simulation_figfoz"
    overrides:
      - "sim.policies=[alns,hgs,psoma]"
      - "sim.graph.area=figueiradafoz"
      - "sim.graph.num_loc=350"
      - "sim.graph.waste_type=plastic"
      - "sim.graph.n_samples=1"
      - "sim.days=31"
      - "tracking=test_sim"
    pre_steps:
      # Generate distance matrix if it doesn't already exist
      - type: gen_dist_matrix
        name: "prepare_distance_matrix"
        args:
          area: figueiradafoz
          check_exists: true
    post_steps:
      # Stage and commit simulation outputs
      - type: git_commit
        name: "commit_sim_results"
        condition: last_succeeded
        args:
          message: "sim: ALNS+HGS+PSOMA results for figueiradafoz ({name})"
          add_pattern: "assets/output/**"

  # ── Example 2: Cartesian-product expansion ────────────────────────────────
  # The `expand` block defines dimensions and their value lists.
  # The BatchExpander computes the full Cartesian product:
  #   3 policies × 2 ms strategies = 6 jobs.
  #
  # Dimension mapping (built-in):
  #   policies            → sim.policies=[{value}]
  #   mandatory_selection → sim.policy.mandatory_selection.strategy={value}
  #   constructors        → sim.policy.constructor={value}
  #   route_improvers     → sim.policy.route_improver={value}
  #   acceptance_criteria → sim.policy.acceptance_criterion={value}
  #   models              → train.policy.model.name={value}
  #   rl_algorithms       → rl.algorithm={value}
  #
  # Values that are lists (like policies) are automatically joined with commas.

  - task: test_sim
    expand:
      # Each policies entry is itself a list (the single-policy sim.policies=[...])
      policies:
        - [alns]
        - [hgs]
        - [psoma]
      # Mandatory node selection strategy applied to ALL policies above
      mandatory_selection:
        - lookahead
        - last_minute_cf70   # maps to the last_minute.threshold config entry
    # Name template supports all dimension keys as {dim_name}
    name_template: "{policies}_{mandatory_selection}"
    # Overrides applied to every expanded job (in addition to dimension overrides)
    base_overrides:
      - "sim.graph.area=figueiradafoz"
      - "sim.graph.num_loc=350"
      - "sim.graph.waste_type=plastic"
      - "sim.days=31"
    pre_steps:
      - type: gen_dist_matrix
        args:
          area: figueiradafoz
          check_exists: true
    post_steps:
      - type: git_commit
        condition: last_succeeded
        args:
          # {name} is the rendered job name (e.g. "alns_lookahead")
          message: "sim: expand results [{name}]"
          add_pattern: "assets/output/**"

  # ── Example 3: Training run followed by test-sim using trained weights ─────
  # First train a model …
  - task: train
    name: "train_am_figfoz"
    overrides:
      - "train.policy.model.name=am"
      - "train.env.curriculum_graphs[0].area=figueiradafoz"
      - "train.env.curriculum_graphs[0].num_loc=350"
      - "train.n_epochs=50"
    post_steps:
      - type: git_commit
        condition: last_succeeded
        args:
          message: "train: AM model for figueiradafoz ({name})"
          add_pattern: "assets/model_weights/**"

  # … then evaluate it in the simulator
  # (adjust model_weights_path to match actual training output)
  # - task: test_sim
  #   name: "eval_am_figfoz"
  #   overrides:
  #     - "sim.policies=[psoma]"
  #     - "sim.graph.area=figueiradafoz"
  #     - "sim.policy.model.weights_path=assets/model_weights/best.pt"
