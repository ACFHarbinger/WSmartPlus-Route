# @package _global_
# =============================================================================
# Batch Configuration — 90-day Pareto-Front Policy Simulations
# =============================================================================
# Runs every policy configuration that appeared on the Pareto front in the
# 30-day study across all 6 scenarios (3 regions × 2 distributions) for 90
# days.  Results are committed after each simulation completes.
#
# Run with:
#     just batch-run batch_cfg=logic/configs/batch.yaml
#
# Output structure (mirrors 30-day layout):
#   assets/output/90days/{area}{N}_plastic/{dist}/{run_name}/
#
# Pareto-front constructors per run type:
#   la_cls  — Lookahead  + CLS:  bpc, pg_clns
#   la_ftsp — Lookahead  + FTSP: aco_hh, bpc, swc_tcf
#   lm_cls  — Last Minute (CF70+CF90) + CLS:  bpc, hgs, pg_clns
#   lm_ftsp — Last Minute (CF70+CF90) + FTSP: bpc
#   sl_cls  — Service Level (SL1+SL2) + CLS:  aco_hh, bpc, pg_clns, sans
#   sl_ftsp — Service Level (SL1+SL2) + FTSP: aco_hh, bpc, pg_clns, psoma
#
# Scenarios (6):
#   riomaior/100/emp · riomaior/100/gamma3
#   riomaior/170/emp · riomaior/170/gamma3
#   figueiradafoz/350/emp · figueiradafoz/350/gamma3
#
# Policy YAML patching
# --------------------
# Each run type requires a different mandatory_selection / route_improvement
# combination.  A patch_policy_yaml pre-step rewrites the relevant policy YAML
# files before launching the Hydra subprocess (exactly as was done manually for
# the 30-day runs), and a restore_policy_yaml post-step (condition: always)
# restores the originals regardless of whether the simulation succeeded.
# =============================================================================

name: "pareto_front_90day"

fail_fast: false
dry_run: false
max_cores: 20

setup:
  - type: delete_path
    args:
      path: "assets/output/90days"
      missing_ok: true

teardown: []

# ─── Individual runs ─────────────────────────────────────────────────────────
# 36 runs = 6 run types × 6 scenarios
# =============================================================================

runs:

  # ===========================================================================
  # la_cls — Lookahead + CLS | constructors: bpc, pg_clns
  # ===========================================================================

  - task: test_sim
    name: "la_cls"
    overrides:
      - "sim.run_name=la_cls"
      - "sim.policies=[bpc,pg_clns]"
      - "sim.graph.area=riomaior"
      - "sim.graph.dm_filepath='gmaps_distmat_plastic[riomaior].csv'"
      - "sim.graph.num_loc=100"
      - "sim.data_distribution=emp"
      - "sim.graph.n_days=90"
      - "sim.n_samples=1"
      - "sim.cpu_cores=20"
    pre_steps:
      - type: patch_policy_yaml
        args:
          policies: [bpc, pg_clns]
          mandatory_selection: lookahead
          route_improvement: cls
      - type: gen_dist_matrix
        args:
          area: riomaior
          waste_type: plastic
          method: gmaps
          dm_filepath: "gmaps_distmat_plastic[riomaior].csv"
          check_exists: true
    post_steps:
      - type: restore_policy_yaml
        condition: always
        args:
          policies: [bpc, pg_clns]
      - type: git_commit
        condition: last_succeeded
        args:
          message: "sim: 90d la_cls riomaior-100/emp"
          add_pattern: "assets/output/90days/{sim_graph_area}{sim_graph_num_loc}_plastic/{sim_data_distribution}/{sim_run_name}/**"

