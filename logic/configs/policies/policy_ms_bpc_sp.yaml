# Policy Configuration

# =============================================================================
# Multi-Stage Branch-and-Price-and-Cut with Set Partitioning (MSBPCSP) Solver
# =============================================================================
# PURPOSE:
#   State-of-the-art exact solver for VRPP based on Barnhart et al. (2000).
#   Implements a multi-stage process:
#   1. Pre-selection (Knapsack MIP)
#   2. Exact BPC (Column Generation + Cutting Planes + B&B)
#   3. Heuristic greedy post-insertion
#   4. Final Set Partitioning reconciliation
#
# ALGORITHM:
#   - Pricing: RCSPP with ng-route relaxation and Lagrangian pre-pruning.
#   - Cutting Planes: Saturated Arc Lifted Cover Inequalities (LCI).
#   - Branching: Spatial Divergence Partitioning.
#
# BACKEND:
#   Uses Gurobi for Master/Subproblem LP and Set Partitioning.
# =============================================================================

ms_bpc_sp:
  custom:
    # ---------------------------------------------------------------------
    # VRPP Settings
    # ---------------------------------------------------------------------
    - profit_aware_operators: false
    - vrpp: true
    - seed: null

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - mandatory_selection: ["other/ms_lookahead.yaml"]
    - time_limit: 60.0
    - route_improvement: []

    # ---------------------------------------------------------------------
    # Branch-and-Bound Search Strategy
    # ---------------------------------------------------------------------
    - search_strategy: "depth_first"
    - prefer_shorter_path_dfs: true

    # ---------------------------------------------------------------------
    # Cutting Plane Strategy
    # ---------------------------------------------------------------------
    - cutting_planes: "saturated_arc_lci"
      # Options: "saturated_arc_lci", "rcc", "sri", "all"
    - max_cut_iterations: 5
    - max_cuts_per_iteration: 5
    - enable_heuristic_rcc_separation: true
    - enable_comb_cuts: false
    - cut_orthogonality_threshold: 0.8

    # ---------------------------------------------------------------------
    # Branching Strategy
    # ---------------------------------------------------------------------
    - branching_strategy: "divergence"
    - use_spatial_partitioning: false
    - enable_strong_branching_heuristic: false
    - strong_branching_size: 5

    # ---------------------------------------------------------------------
    # Column Generation Settings
    # ---------------------------------------------------------------------
    - max_cg_iterations: 50
    - max_routes_per_pricing: 5
    - rc_tolerance: 0.00000001
    - cg_at_root_only: false
    - enable_column_pool_deduplication: true

    # ---------------------------------------------------------------------
    # Pricing (RCSPP) Settings
    # ---------------------------------------------------------------------
    - use_ng_routes: true
    - ng_neighborhood_size: 8
    - rcspp_timeout: 30.0
    - rcspp_max_labels: 1000000

    # ---------------------------------------------------------------------
    # Lagrangian Pre-Pruning
    # ---------------------------------------------------------------------
    - lr_pre_pruning: false
    - lr_lambda_init: 0.0
    - lr_max_subgradient_iters: 30
    - lr_subgradient_theta: 1.0
    - lr_op_time_limit: 3.0
    - lr_pre_pruning_depth_limit: -1
    - lr_warm_start_cg: false

    # ---------------------------------------------------------------------
    # Global Solver Hyperparameters
    # ---------------------------------------------------------------------
    - max_bb_nodes: 1000
    - optimality_gap: 0.0001
    - early_termination_gap: 0.001
    - exact_mode: false
    - enable_node_visitation_branching: true
    - enable_dssr: true
    - dssr_max_iters: 8
    - enable_reduced_cost_arc_fixing: true
    - route_budget: .inf
