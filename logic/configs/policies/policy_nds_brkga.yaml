# NDS-BRKGA Policy Configuration

# =============================================================================
# NDS-BRKGA (Non-Dominated Sorting Biased Random-Key Genetic Algorithm)
# =============================================================================
# PURPOSE:
#   Joint mandatory-bin selection and route construction. This solver
#   optimizes bins to visit and their visit order simultaneously in a
#   single evolutionary loop.
#
# ALGORITHM:
#   1. Encode selection and routing in 2N random keys.
#   2. Compute adaptive selection thresholds from overflow risk.
#   3. Multi-objective evaluation: (-profit, overflow_cost, distance).
#   4. NSGA-II elite extraction based on non-dominated ranks.
#   5. Biased crossover (elite x non-elite) + mutants.
# =============================================================================

nds_brkga:
  custom:
    - pop_size: 60
    - n_elite: 15
    - n_mutants: 10
    - bias_elite: 0.7
    - max_generations: 200
    - time_limit: 90
    - seed: 42
    - overflow_penalty: 1000.0
    - seed_selection_strategy: "knapsack"
    - seed_routing_strategy: "greedy"
    - n_seed_solutions: 5
    - selection_threshold_min: 0.1
    - selection_threshold_max: 0.9
