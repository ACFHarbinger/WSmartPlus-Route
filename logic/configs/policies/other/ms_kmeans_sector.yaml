# =============================================================================
# Mandatory Strategy: K-Means Geographic Sector Selection
# =============================================================================
# PURPOSE:
#   Simulates traditional zone-based collection schedules by partitioning
#   bins into G geographic sectors and collecting one sector each day.
#
# ALGORITHM:
#   1. Pre-partition bins into G sectors using K-means on coordinates
#   2. Cycle through sectors: sector_index = (day - 1) % G
#   3. Mandate all bins in the active sector
#
# USE CASES:
#   - Operationally realistic static baseline (zone-day scheduling)
#   - Benchmarking the benefit of fill-level awareness over spatial-only grouping
#
# PARAMETERS:
#   - n_sectors: 5 (divide map into 5 zones, 1 per weekday)
#     Range: 1 to N_bins
# =============================================================================

strategy: kmeans_sector
n_sectors: 5
max_fill: 1.0
