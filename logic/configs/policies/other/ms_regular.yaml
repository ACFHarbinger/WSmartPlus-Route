# =============================================================================
# mandatory Strategy: Regular (Periodic Collection)
# =============================================================================
# PURPOSE:
#   Fixed-frequency collection schedule - collect every N days regardless
#   of fill level. Traditional waste collection approach.
#
# ALGORITHM:
#   1. Track days since last collection for each bin
#   2. Mark bin as mandatory if days_since_collection >= frequency
#   3. Deterministic, no fill-level awareness
#
# USE CASES:
#   - Baseline for comparison against adaptive strategies
#   - Regulatory compliance (mandatory collection intervals)
#   - Areas with predictable waste generation
#
# PARAMETERS:
#   - lvl3: frequency 3 (collect every 3 days)
#   - lvl4: frequency 4 (collect every 4 days)
#   - lvl5: frequency 5 (collect every 5 days / weekly work schedule)
# =============================================================================

lvl3:
  strategy: regular
  frequency: 3

lvl4:
  strategy: regular
  frequency: 4

lvl5:
  strategy: regular
  frequency: 5
