# =============================================================================
# mandatory Strategy: Last Minute (Threshold-Based)
# =============================================================================
# PURPOSE:
#   Collect bins when current fill level exceeds a fixed threshold.
#   Simple, reactive strategy without prediction.
#
# ALGORITHM:
#   1. Check current fill level for each bin
#   2. Mark bin as mandatory if fill >= threshold
#   3. No temporal prediction involved
#
# USE CASES:
#   - Static CVRP problems without temporal dynamics
#   - TSP policies (single-vehicle, fast decision)
#   - Baseline comparison for predictive strategies
#
# PARAMETERS:
#   - cf70: threshold 70 (70% capacity)
#     Conservative threshold - collects earlier, reduces overflow risk
#   - cf90: threshold 90 (90% capacity)
#     Aggressive threshold - fewer collections, higher overflow risk
# =============================================================================

last_minute_cf70:
  strategy: last_minute
  threshold: 70

last_minute_cf90:
  strategy: last_minute
  threshold: 90
