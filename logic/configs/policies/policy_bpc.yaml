bpc:
  custom:
    # ---------------------------------------------------------------------
    # VRPP Settings
    # ---------------------------------------------------------------------
    - profit_aware_operators: true
    - vrpp: true

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - mandatory_selection: ["other/ms_lookahead.yaml"]
    - time_limit: 60.0
    - route_improvement: []

    # ---------------------------------------------------------------------
    # Branch-and-Bound Search Strategy
    # ---------------------------------------------------------------------
    - search_strategy: "depth_first"

    # ---------------------------------------------------------------------
    # Cutting Plane Strategy
    # ---------------------------------------------------------------------
    - cutting_planes: "rcc"
      # RCC only — SRI and fleet_cover add separation overhead that
      # burns CG budget without enough bound improvement at 100 nodes.

    # ---------------------------------------------------------------------
    # Branching Strategy
    # ---------------------------------------------------------------------
    - branching_strategy: "divergence"

    # ---------------------------------------------------------------------
    # Solver Hyperparameters
    # ---------------------------------------------------------------------
    - max_cg_iterations: 50
    - max_cut_iterations: 5
    - max_cuts_per_iteration: 5
    - max_routes_per_pricing: 50
      # High column count per call — heuristic pricing finds many good
      # routes fast; more columns = better LP signal per iteration.
    - max_bb_nodes: 500
      # Tight B&B node cap. At 100 nodes BPC won't prove optimality
      # anyway; spending budget on B&B instead of CG is wasteful.
    - optimality_gap: 0.02
      # Accept 2% gap — stops B&B early once bound is tight enough.
    - early_termination_gap: 0.05
      # Heuristic stop at 5% gap. In practice CG converges to near-
      # optimal LP quickly; the last 5% costs disproportionate time.
    - cg_at_root_only: true
      # Run full CG once at the root to build a rich column pool,
      # then reuse it at all B&B nodes. At 100 nodes this is the only
      # way to get meaningful B&B exploration within 60s.

    # --- Lagrangian pre-pruning ---
    - lr_pre_pruning: false
      # Disabled — subgradient + UOP adds 3-10s per node and the LR
      # bound is weaker than the ng-route LP bound anyway at depth > 0.
    - lr_lambda_init: 0.0
    - lr_max_subgradient_iters: 30
    - lr_subgradient_theta: 1.0
    - lr_op_time_limit: 3.0
    - lr_pre_pruning_depth_limit: -1
    - lr_warm_start_cg: false

    # ---------------------------------------------------------------------
    # RCSPP Pricing Relaxation
    # ---------------------------------------------------------------------
    - use_ng_routes: true
    - ng_neighborhood_size: 8
      # 8 balances label count vs bound quality at 100 nodes.
      # 12 explodes the label space; 5 weakens the relaxation too much.
    - rcspp_timeout: 5.0
      # 5s per pricing call. Heuristic pricing handles most columns;
      # exact DP runs within this budget on the partial label cap.
    - rcspp_max_labels: 500000
      # 500k labels ≈ 50s at Python speed — timeout fires first anyway.
      # High enough to not be a secondary bottleneck.

    # ---------------------------------------------------------------------
    # Advanced Cutting Plane Strategy
    # ---------------------------------------------------------------------
    - enable_heuristic_rcc_separation: true
    - enable_comb_cuts: false
      # Comb separation is O(n³) per round — too expensive at 100 nodes.
    - cut_orthogonality_threshold: 0.8

    # ---------------------------------------------------------------------
    # B&B Search & Branching
    # ---------------------------------------------------------------------
    - use_spatial_partitioning: false
    - enable_strong_branching_heuristic: false
    - enable_column_pool_deduplication: true
    - enable_hybrid_search: false
    - rc_tolerance: 1e-5
      # 1e-8 accepts nearly-zero columns that waste master LP solves.
      # 1e-5 is the practical threshold for meaningful new columns.
    - exact_mode: false
      # Dual smoothing (Wentges 1997) dramatically accelerates CG
      # convergence at the root — essential when cg_at_root_only=true
      # and you need a rich column pool built in < 40s.
    - strong_branching_size: 5
