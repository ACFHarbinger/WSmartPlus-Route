# =============================================================================
# BPC Policy — Near-Optimal Configuration (300s budget)
# =============================================================================
# TARGET: Closest possible to the true optimum on 100-node VRPP instances
#         within a 300-second wall-clock budget.
#
# ARCHITECTURE RATIONALE:
#   With 300s the bottleneck shifts from "get any integer solution" to
#   "close the LP integrality gap." The strategy is:
#     1. Rich root CG with full cut suite (≈ 60–80s)
#     2. Moderate B&B with node-visitation branching (≈ 180s)
#     3. Reserve ≈ 40s for cut separation overhead + SP merge
#
#   Key decisions vs. the 60s YAML:
#     - cg_at_root_only: FALSE — re-pricing at non-root nodes is mandatory
#       for tight bounds when B&B has time to explore the tree.
#     - cutting_planes: "all" — Min-Cut + Triangle Clique + limited-memory
#       rank-1 SRI are the decisive cuts for VRPP integrality gap closure
#       (Poggi, Viana, Uchoa 2010).
#     - ng_neighborhood_size: 12 — practical ceiling before label explosion;
#       combined with DSSR this approximates elementary pricing well.
#     - enable_strong_branching_heuristic: true — with 300s the Phase 1/2
#       LP evaluation cost amortises over the deeper tree.
#     - lr_pre_pruning: true — at 300s the subgradient pass at root pays off
#       by providing a tight LR bound that prunes subtrees before CG starts.
#     - exact_mode: false — Wentges smoothing dramatically accelerates CG
#       convergence; disabling it for "exactness" costs more than it gains
#       at 100 nodes within any finite time budget.
# =============================================================================

bpc:
  custom:
    # -------------------------------------------------------------------------
    # VRPP Problem Settings
    # -------------------------------------------------------------------------
    - profit_aware_operators: true
      # Use profit-aware greedy insertion for warm-start routes.
      # Ensures the initial column pool covers profitable optional nodes,
      # giving the LP non-zero duals for optional nodes from iteration 1.

    - vrpp: true

    # -------------------------------------------------------------------------
    # Infrastructure
    # -------------------------------------------------------------------------
    - mandatory_selection: ["other/ms_lookahead.yaml"]

    - time_limit: 300.0
      # Full 300s wall-clock budget.

    - route_improvement: []

    # -------------------------------------------------------------------------
    # Branch-and-Bound Search Strategy
    # -------------------------------------------------------------------------
    - search_strategy: "depth_first"
      # DFS maximises LP basis reuse across parent→child transitions,
      # giving 3–5× speedup on child LP solves via dual simplex warm-start.
      # Required for correctness with spatial divergence branching.

    # -------------------------------------------------------------------------
    # Cutting Plane Strategy
    # -------------------------------------------------------------------------
    - cutting_planes: "all"
      # Activates every registered cut family:
      #   RCC  — Rounded Capacity Cuts (Lysgaard et al. 2004)
      #   SRI  — 3-Subset-Row Inequalities (Jepsen et al. 2008)
      #   Min-Cut — Flow-consistency cuts on y_v (Poggi et al. 2010)
      #   Triangle Clique — Incompatibility cuts on node triples
      #   Limited-memory rank-1 — Up to 5-row SRI (Pecin et al. 2017)
      #   Node profit bound — Knapsack UB cuts on y (Dang et al. 2013)
      #   Path elimination — Infeasible partial-path cuts
      #   Fleet cover + LCI (Saturated-arc and Physical-capacity variants)
      # These cut families are the primary mechanism for closing the VRPP
      # integrality gap; without them the LP bound is too loose for B&B.

    # -------------------------------------------------------------------------
    # Branching Strategy
    # -------------------------------------------------------------------------
    - branching_strategy: "divergence"
      # Spatial divergence branching (Barnhart et al. 1998): traces the two
      # highest-λ fractional routes from the depot until they diverge, then
      # partitions outgoing arcs by polar angle. Balanced spatial splits
      # minimise tree depth vs. edge branching.

    - enable_node_visitation_branching: true
      # Hierarchical y_v branching BEFORE arc/Ryan-Foster decisions.
      # Directly resolves the profit-selection × routing duality by
      # branching on which optional nodes to visit (Boussier et al. 2007).
      # Phase 0/1/2 pipeline: heuristic rank → restricted LP eval → pick best.

    # -------------------------------------------------------------------------
    # Column Generation Hyperparameters
    # -------------------------------------------------------------------------
    - max_cg_iterations: 150
      # Allow up to 150 CG iterations per node. With 300s and cg_at_root_only
      # false, non-root nodes get smaller budgets but deeper convergence.

    - max_cut_iterations: 10
      # 10 separation rounds per CG convergence — more rounds = tighter LP.

    - max_cuts_per_iteration: 10
      # Up to 10 cuts per round. Combined with cut_orthogonality_threshold
      # this adds diverse, non-redundant cuts efficiently.

    - max_routes_per_pricing: 50
      # 50 columns per pricer call. Heuristic pricing generates many good
      # columns quickly; higher values give the master LP richer signal.

    - cg_at_root_only: false
      # CRITICAL for near-optimality: re-price at every B&B node.
      # cg_at_root_only=true gives a heuristic bound at non-root nodes and
      # can prune incorrectly, missing the optimal solution. With 300s this
      # is affordable — non-root CG is warm-started from parent basis.

    - optimality_gap: 0.005
      # Stop B&B when the gap between LP bound and best integer is ≤ 0.5%.
      # Tighter than 60s config (2%); achievable within 300s on most instances.

    - early_termination_gap: 0.01
      # Heuristic early stop at 1% gap. The last 0.5% of gap closure often
      # requires disproportionate B&B time; 1% is practically optimal.

    - max_bb_nodes: 2000
      # Up to 2000 B&B nodes. With 300s and DFS, this explores deep subtrees
      # while maintaining LP basis reuse benefits.

    # -------------------------------------------------------------------------
    # Lagrangian Relaxation Pre-Pruning
    # -------------------------------------------------------------------------
    - lr_pre_pruning: true
      # Enable LR pre-pruning at B&B nodes (Poggi de Aragão et al. 2010).
      # A fast subgradient pass computes a Lagrangian UB before CG starts;
      # if UB ≤ incumbent, the node is pruned without touching the master LP.
      # At 300s this saves meaningful time at deeper nodes.

    - lr_lambda_init: 0.0
      # Start multiplier at 0 (unpenalised capacity). The subgradient will
      # quickly find a good λ* from the warm-start dual information.

    - lr_max_subgradient_iters: 40
      # 40 Polyak iterations — enough to tighten the LR bound significantly
      # without exceeding the per-node LR time budget.

    - lr_subgradient_theta: 1.0
      # Step-size multiplier θ=1.0 (standard Polyak rule). Values > 1 can
      # be aggressive but cause oscillation; 1.0 is the safe default.

    - lr_op_time_limit: 5.0
      # 5s per uncapacitated OP solve inside the subgradient. At 300s total
      # this is affordable and gives a tighter bound than 3s.

    - lr_pre_pruning_depth_limit: -1
      # Apply LR pruning at ALL tree depths. At shallow nodes the LR bound
      # is strong; at deep nodes it degrades but costs little (warm-started).

    - lr_warm_start_cg: true
      # Seed the initial column pool at each node with the UOP solution at λ*.
      # Provides a stronger starting point for CG, reducing iteration count.
      # Only meaningful when lr_pre_pruning is also true (shares λ*).

    # -------------------------------------------------------------------------
    # RCSPP Pricing Relaxation
    # -------------------------------------------------------------------------
    - use_ng_routes: true
      # ng-route relaxation (Baldacci, Mingozzi, Roberti 2011). Avoids O(2^n)
      # exact elementarity while providing a tight bound in practice.
      # For true exact ESPPRC, set false — but intractable at 100 nodes.

    - ng_neighborhood_size: 12
      # Practical ceiling before label count explodes. At 12, combined with
      # DSSR, the relaxation is tight enough that non-elementary optimal
      # solutions are extremely rare on VRPP instances.

    - rcspp_timeout: 15.0
      # 15s per pricing call. With 300s total and cg_at_root_only=false,
      # we can afford longer exact pricing calls that return more diverse
      # columns. Heuristic pricing still runs first (< 0.1s).

    - rcspp_max_labels: 2000000
      # 2M label cap. At Python speed (~10k labels/s) this gives ~200s of
      # exact DP — the 15s timeout fires first on 100-node instances,
      # but the cap prevents OOM if label density is higher than expected.

    # -------------------------------------------------------------------------
    # DSSR — Decremental State-Space Relaxation
    # -------------------------------------------------------------------------
    - enable_dssr: true
      # Wrap exact RCSPP with DSSR (Righini & Salani 2008). Iteratively adds
      # revisited vertices to ng-memory until returned paths are elementary.
      # The decisive pricing improvement for TOP/VRPP (Keshtkaran et al. 2016).

    - dssr_max_iters: 8
      # Up to 8 refinement iterations. In practice convergence happens in 2–4;
      # 8 is the safety ceiling without excessive overhead.

    # -------------------------------------------------------------------------
    # Reduced-Cost Arc Fixing
    # -------------------------------------------------------------------------
    - enable_reduced_cost_arc_fixing: true
      # Eliminate arcs from the pricing graph whose min reduced cost exceeds
      # the LP-incumbent gap (Irnich et al. 2010). Typically removes 20–40%
      # of arcs after a few B&B nodes, cascading into faster labeling.

    # -------------------------------------------------------------------------
    # Advanced Cutting Plane Controls
    # -------------------------------------------------------------------------
    - enable_heuristic_rcc_separation: true
      # Heuristic max-flow RCC separation in addition to connected-component
      # heuristic. Finds violated RCCs on non-component subsets — important
      # for VRPP instances with spatially distributed mandatory bins.

    - enable_comb_cuts: false
      # Comb separation is O(n³) per round. At 100 nodes this consumes ~5s
      # per separation call — too expensive even with 300s total. The
      # Min-Cut and Triangle Clique cuts are more effective for VRPP.

    - cut_orthogonality_threshold: 0.7
      # Lower than the 60s config (0.8) — with more time we can afford more
      # distinct cuts per round, reducing redundancy and tightening the LP
      # more aggressively. Below 0.5 the overhead from filter checks grows.

    - route_budget: .inf
      # No explicit route-distance budget cap. Set this to the vehicle's
      # maximum travel distance/time if known — enables Triangle Clique and
      # Path Elimination cuts based on temporal infeasibility.

    # -------------------------------------------------------------------------
    # B&B Search and Branching Controls
    # -------------------------------------------------------------------------
    - use_spatial_partitioning: false
      # Coordinate-based arc-set partitioning. Disabled — the default
      # flow-sorted median split is already well-balanced for most instances.

    - enable_strong_branching_heuristic: true
      # Phase 1 restricted LP evaluation of top branching candidates.
      # With 300s the per-candidate LP solve cost (< 0.5s each) is worth
      # the 20–40% reduction in B&B node count it typically delivers.

    - strong_branching_size: 5
      # Evaluate top 5 candidates in Phase 1, pick best 2 for Phase 2.
      # Beyond 5 the marginal node-count reduction doesn't justify the cost.

    - enable_column_pool_deduplication: true
      # Periodically remove duplicate columns (same node set, different order).
      # Keeps the master LP size manageable without losing dual information.

    - enable_hybrid_search: false
      # Hybrid DFS/BFS. Keep false — pure DFS is better for basis reuse
      # in the presence of cg_at_root_only=false.

    - rc_tolerance: 1e-6
      # Very tight reduced-cost acceptance threshold. With 300s we can afford
      # to accept nearly any improving column; 1e-6 filters only numerical
      # noise while 1e-5 may miss near-zero-RC columns near optimality.

    - exact_mode: false
      # Keep Wentges dual smoothing active. Disabling it (exact_mode=true)
      # is theoretically purer but convergence is 2–5× slower in practice.
      # The smoothing recovery phase still guarantees exact bounds.

    - prefer_shorter_path_dfs: true
      # DFS child ordering per Barnhart §3.2: explore the branch that keeps
      # the shorter path first, finding feasible solutions earlier in the tree.
