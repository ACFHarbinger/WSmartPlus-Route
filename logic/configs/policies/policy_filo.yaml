# @package rl
# Fast Iterative Localized Optimization (FILO) Configuration

type: python

filo:
  time_limit: 60.0
  max_iterations: 50000
  initial_temperature_factor: 10.0
  final_temperature_factor: 100.0
  shaking_lb_factor: 0.5
  shaking_ub_factor: 2.0
  shaking_lb_intensity: 0.5
  shaking_ub_intensity: 1.5
  omega_alpha: 0.5
  omega_base_multiplier: 1.0
  delta_gamma: 0.25
  gamma_base: 1.0
  gamma_lambda: 2.0
  svc_size: 50
  n_cw: 100
  local_search_iterations: 500
  seed: 42
  mandatory_selection: ["other/ms_lookahead.yaml"]
  # VRPP Settings
  vrpp: true
  profit_aware_operators: false

  route_improvement: []
