name: Sync to Public Repo
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this?"
        required: false
        default: "Manual trigger"
  push:
    branches:
      - main
jobs:
  sync:
    if: github.repository == 'ACFHarbinger/WSmart-Route'
    runs-on: ubuntu-latest
    steps:
      # Use the checkout action with your Personal Access Token (PAT)
      # to ensure the local environment has cross-repo permissions
      - name: Checkout Private Repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          fetch-depth: 0 # Essential to get full history for a successful push

      - name: Push to Public
        env:
          PAT_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # 1. Configure Git identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Remove directories you don't want public
          # We use 'git rm -rf' to remove them from the index and the working tree
          REMOVED=0
          if [ -d "bibliography" ]; then
            git rm -rf bibliography
            REMOVED=1
          fi
          if [ -d "assets" ]; then
            git rm -rf assets
            REMOVED=1
          fi
          if [ "$REMOVED" = "1" ]; then
            git commit -m "chore: exclude private directories from public sync"
          fi

          # 3. Clean up and add remote
          git remote remove public || true
          git remote add public https://x-access-token:${PAT_TOKEN}@github.com/ACFHarbinger/WSmartPlus-Route.git

          # 4. Force push the modified local state
          # This will make the public repo match your local state (minus bibliography)
          git push public main --force
