        n_heads: 8
        n_sublayers: null
        normalization:
          norm_type: batch
          epsilon: 1.0e-05
          learn_affine: true
          track_stats: false
          momentum: 0.1
          n_groups: 1
          k_lrnorm: 1.0
        activation:
          name: gelu
          param: 1.0
          threshold: 6.0
          replacement_value: 6.0
          n_params: 3
          range:
          - 0.125
          - 0.3333333333333333
        dropout: 0.1
        mask_inner: true
        mask_graph: false
        spatial_bias: false
        connection_type: residual
        aggregation_graph: avg
        aggregation_node: sum
        spatial_bias_scale: 1.0
