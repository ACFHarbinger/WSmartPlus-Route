      decoder:
        type: attention
        embed_dim: 128
        hidden_dim: 512
        n_layers: 3
        n_heads: 8
        normalization:
          norm_type: batch
          epsilon: 1.0e-05
          learn_affine: true
          track_stats: false
          momentum: 0.1
          n_groups: 1
          k_lrnorm: 1.0
        activation:
          name: gelu
          param: 1.0
          threshold: 6.0
          replacement_value: 6.0
          n_params: 3
          range:
          - 0.125
          - 0.3333333333333333
        decoding:
          strategy: greedy
          beam_width: 1
          temperature: 1.0
          top_k: null
          top_p: null
          tanh_clipping: 0.0
          mask_logits: true
          multistart: false
          num_starts: 1
          select_best: false
          reward_weight: 0.0
          length_penalty_alpha: 0.0
        dropout: 0.1
        mask_logits: true
        connection_type: residual
        n_predictor_layers: null
        tanh_clipping: 10.0
        hyper_expansion: 4
      temporal_horizon: 0
      policy_config: null
      load_path: null
    reward:
      cost_weight: 1.0
      waste_weight: 1.0
      overflow_penalty: 1.0
    mandatory_selection: null
    route_improvement: null
    seed: null
    vrpp: true
