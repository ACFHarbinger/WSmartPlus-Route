# @package _global_

# =============================================================================
# AHVPL Expert Policy Configuration for RL Training
# =============================================================================
# PURPOSE:
#   Configuration for using Augmented Hybrid Volleyball Premier League (AHVPL)
#   as expert policy in Imitation Learning or Adaptive Imitation Learning.
#   Extends HVPL with HGS diversity-driven crossover and bi-criteria fitness.
#
# USAGE:
#   python main.py train rl.imitation.policy_config=tasks/policies/rl/ahvpl
# =============================================================================

_target_: logic.src.configs.rl.policies.AHVPLConfig

# Runtime Control
time_limit: 60.0
# Maximum wall-clock seconds for AHVPL solver
# Range: 10-120 (60s = production standard)

# VPL League Parameters
n_teams: 10
# Number of solutions (teams) in the league
# Range: 5-20

max_iterations: 20
# Number of league seasons
# Range: 10-100

sub_rate: 0.2
# Fraction of weakest teams replaced per iteration
# Range: 0.1-0.5

# ACO Parameters
aco_iterations: 1
# ACO iterations per construction call

# ALNS Coaching Parameters
alns_iterations: 50
# Number of destroy-repair cycles per coaching session
# Range: 50-200

# Genetic & Diversity Parameters (HGS Integration)
crossover_rate: 0.7
# Probability of applying OX crossover per generation
# Range: 0.0-1.0

elite_size: 5
# Number of elite solutions for diversity preservation
# Range: 3-10
