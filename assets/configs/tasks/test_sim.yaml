# General Configuration
task: test_sim
seed: 42
load_dataset: "data/wsr_simulator/datasets/riomaior100_gamma3_wsr30_N1_seed42.npz"

# Simulation Configuration
sim:
  cpu_cores: 0
  n_vehicles: 0
  days: 30
  no_cuda: true
  n_samples: 1
  problem: "vrpp"
  output_dir: "output"
  checkpoint_dir: "checkpoints"
  checkpoint_days: 0
  data_distribution: "gamma3"

  # Relative to ROOT/data/wsr_simulator/
  graph:
    num_loc: 100
    n_samples: 1
    area: "riomaior"
    waste_type: "plastic"
    dm_filepath: "gmaps_distmat_${sim.graph.waste_type}[${sim.graph.area}].csv"
    focus_graph: "graphs_${sim.graph.num_loc}V_1N_${sim.graph.waste_type}.json"

  # Policies to run
  policies:
