# @package _global_
# =============================================================================
# Test Simulator Task Configuration
# =============================================================================
# Configuration for multi-day waste collection simulation testing.
# =============================================================================
# Used by: python main.py test_sim
# =============================================================================

defaults:
  - /policies@p.alns: policy_alns
  - /policies@p.bcp: policy_bcp
  - /policies@p.cvrp: policy_cvrp
  - /policies@p.hgs: policy_hgs
  - /policies@p.hgs_alns: policy_hgs_alns
  - /policies@p.hh_aco: policy_hh_aco
  - /policies@p.ks_aco: policy_ks_aco
  - /policies@p.neural: policy_neural
  - /policies@p.sans: policy_sans
  - /policies@p.sisr: policy_sisr
  - /policies@p.tsp: policy_tsp
  - /policies@p.vrpp: policy_vrpp
  - /policies@p.ahvpl: policy_ahvpl
  - /policies@p.hvpl: policy_hvpl
  - /policies@p.qde: policy_qde
  - /policies@p.psoma: policy_psoma
  - /policies@p.abc: policy_abc
  - /policies@p.fa: policy_fa
  - /policies@p.sca: policy_sca
  - /policies@p.hs: policy_hs
  - /policies@p.slc: policy_slc
  - /policies@p.lca: policy_lca
  - /policies@p.gphh: policy_gphh
  - /policies@p.hmm_gd: policy_hmm_gd
  - /policies@p.lahc: policy_lahc
  - /policies@p.rrt: policy_rrt
  - /policies@p.oba: policy_oba
  - /policies@p.gls: policy_gls
  - /policies@p.rts: policy_rts
  - /policies@p.ga: policy_ga
  - /policies@p.sa: policy_sa
  - /policies@p.ils: policy_ils
  - /policies@p.vns: policy_vns
  - _self_
  - override /tracking: test_sim

# General Configuration
task: test_sim
seed: 42
#load_dataset: "data/wsr_simulator/datasets/${sim.graph.area}${sim.graph.num_loc}_${sim.data_distribution}_wsr${sim.days}_N${sim.n_samples}_seed${sim.seed}.npz"
load_dataset: "data/wsr_simulator/datasets/april_2024_summary_with_coords.csv"

# Simulation Configuration
sim:
  cpu_cores: 0
  n_vehicles: 0
  days: 30
  no_cuda: true
  n_samples: 1
  problem: "vrpp"
  output_dir: "output"
  checkpoint_dir: "checkpoints"
  checkpoint_days: 0
  data_distribution: "gamma1"
  stats_filepath: "datasets/april_2024_summary_with_coords.csv"

  # Relative to ROOT/data/wsr_simulator/
  graph:
    num_loc: 100
    n_samples: 10
    area: "riomaior"
    waste_type: "plastic"
    dm_filepath: "gmaps_distmat_${sim.graph.waste_type}[${sim.graph.area}].csv"
    focus_graph: "graphs_${sim.graph.num_loc}V_1N_${sim.graph.waste_type}.json"

  # Policies to run
  policies:
    - hgs: ${p.hgs.hgs}
    - sans: ${p.sans.sans}
    - alns: ${p.alns.alns}
    - vrpp: ${p.vrpp.vrpp}
    - hgs_alns: ${p.hgs_alns.hgs_alns}
    - sisr: ${p.sisr.sisr}
    - tsp: ${p.tsp.tsp}
    - cvrp: ${p.cvrp.cvrp}
    - bcp: ${p.bcp.bcp}
    - neural: ${p.neural.neural}
    - ks_aco: ${p.ks_aco.ks_aco}
    - hh_aco: ${p.hh_aco.hh_aco}
    - qde: ${p.qde.qde}
    - psoma: ${p.psoma.psoma}
    - abc: ${p.abc.abc}
    - fa: ${p.fa.fa}
    - sca: ${p.sca.sca}
    - hs: ${p.hs.hs}
    - slc: ${p.slc.slc}
    - lca: ${p.lca.lca}
    - gphh: ${p.gphh.gphh}
    - hmm_gd: ${p.hmm_gd.hmm_gd}
    - lahc: ${p.lahc.lahc}
    - rrt: ${p.rrt.rrt}
    - oba: ${p.oba.oba}
    - gls: ${p.gls.gls}
    - rts: ${p.rts.rts}
    - ga: ${p.ga.ga}
    - sa: ${p.sa.sa}
    - ils: ${p.ils.ils}
    - vns: ${p.vns.vns}
