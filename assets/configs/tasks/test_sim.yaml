    - ks_aco: ${p.ks_aco.ks_aco}
    - hh_aco: ${p.hh_aco.hh_aco}
    - qde: ${p.qde.qde}
    - psoma: ${p.psoma.psoma}
    - abc: ${p.abc.abc}
    - fa: ${p.fa.fa}
    - sca: ${p.sca.sca}
