# Differential Evolution (DE/rand/1/bin) Policy Configuration

# =============================================================================
# DE Policy Configuration - Rigorous Replacement for ABC
# =============================================================================
# PURPOSE:
#   **TRUE DIFFERENTIAL EVOLUTION** with proper DE/rand/1/bin mechanics.
#   This implementation includes ALL DE components (Storn & Price 1997):
#   - Differential mutation: v = x_r1 + F × (x_r2 - x_r3)
#   - Binomial crossover with CR parameter
#   - Greedy one-to-one selection
#   - No metaphor (employed/onlooker/scout bees)
#   - No trial counter or abandonment mechanism
#
# WHY DE REPLACES ABC:
#   The Artificial Bee Colony (ABC) is mathematically isomorphic to Differential
#   Evolution with fitness-proportionate selection, but with unnecessary metaphor:
#
#   ABC Employed Phase: v = x_i + φ(x_i - x_k) [peer-based perturbation]
#   DE Mutation: v = x_r1 + F × (x_r2 - x_r3) [differential mutation]
#
#   ABC Onlooker Phase: Roulette-wheel selection based on fitness
#   DE Selection: Greedy one-to-one replacement
#
#   Problems with ABC:
#   1. Fitness-proportionate selection is slower than greedy selection
#   2. Three agent types (employed/onlooker/scout) are unnecessary abstractions
#   3. Trial counter and limit parameter add complexity without benefit
#   4. "Food source" metaphor obscures actual DE mechanics
#   5. Often requires canonical GA crossover injections for discrete spaces
#
#   DE Advantages:
#   1. ✓ Greedy selection is faster and more effective
#   2. ✓ Explicit crossover operator (CR parameter) controls exploration
#   3. ✓ Single population - no metaphorical agent types
#   4. ✓ Simpler algorithm with proven convergence properties
#   5. ✓ 25+ years of theoretical foundation vs bee foraging metaphor
#
# ALGORITHM (Storn & Price 1997):
#   1. Initialize population of NP solution vectors
#   2. For each generation:
#      a. For each target vector x_i:
#         - Mutation: v_i = x_r1 + F × (x_r2 - x_r3) where r1,r2,r3 distinct
#         - Crossover: u_ij = v_ij if rand() < CR or j=j_rand, else x_ij
#         - Selection: x_i(t+1) = u_i if f(u_i) ≥ f(x_i), else x_i
#      b. Track global best solution
#
# ENCODING:
#   - Discrete routing solutions as node sets
#   - Differential mutation via set operations
#   - Destroy-repair operators for discrete space
#
# PERFORMANCE:
#   Superior to ABC due to greedy selection and explicit crossover.
#   F parameter controls exploration intensity.
#   CR parameter balances inheritance from target vs. mutant.
#
# REFERENCES:
#   Storn, R., & Price, K. (1997). "Differential Evolution – A Simple and
#   Efficient Heuristic for Global Optimization over Continuous Spaces."
#   Journal of Global Optimization, 11(4), 341-359.
#
#   Karaboga, D. (2005). "An idea based on honey bee swarm for numerical
#   optimization." Technical Report TR06, Erciyes University.
#   [Note: ABC is DE with fitness-proportionate selection - superseded by this implementation]
#
# TYPICAL USE CASES:
#   - Global optimization with balanced exploration-exploitation
#   - Replacement for any ABC-based implementation
#   - Benchmarking against evolutionary algorithms
# =============================================================================

de:
  custom:
    # ---------------------------------------------------------------------
    # Population Parameters
    # ---------------------------------------------------------------------
    - pop_size: 50
      # Population size (NP)
      # Range: 20-100
      # Recommendation: NP = 10×D where D is dimensionality
      # Standard DE: 50 for medium problems, 100 for large problems
      # Note: ABC typically uses n_sources=20, but DE benefits from larger population

    # ---------------------------------------------------------------------
    # DE Differential Mutation Parameters (Storn & Price 1997)
    # ---------------------------------------------------------------------
    - mutation_factor: 0.8
      # Differential weight (F)
      # Range: [0, 2]
      # Standard: F ∈ [0.5, 1.0]
      # Recommendation: 0.8 for balanced exploration
      #   F = 0.5: Conservative exploration (small perturbations)
      #   F = 1.0: Aggressive exploration (classical DE)
      # Controls amplification of differential variation (x_r2 - x_r3)
      # **EXPLICIT IN DE, IMPLICIT IN ABC** - this is why DE is superior

    - crossover_rate: 0.9
      # Crossover probability (CR)
      # Range: [0, 1]
      # Standard: CR ∈ [0.8, 0.95]
      # Recommendation: 0.9 for high recombination
      #   CR = 0.0: No recombination (pure mutation)
      #   CR = 1.0: Full replacement (no inheritance from target)
      # Controls inheritance from mutant vs. target vector
      # **MISSING IN ABC** - ABC uses implicit crossover via destroy-repair

    # ---------------------------------------------------------------------
    # Discrete Mutation Strength
    # ---------------------------------------------------------------------
    - n_removal: 3
      # Number of nodes removed during destroy-repair mutation
      # Range: 1-10
      # Recommendation: 3 for medium instances
      # Acts as discrete analog to continuous mutation magnitude
      # Note: ABC uses n_removal=1, but DE benefits from larger perturbations

    # ---------------------------------------------------------------------
    # Termination Criteria
    # ---------------------------------------------------------------------
    - max_iterations: 500
      # Maximum number of generations (G_max)
      # Range: 100-1000
      # Recommendation: 500 for balanced runtime/quality
      # Note: ABC typically uses 200, but DE converges more reliably with more iterations

    # ---------------------------------------------------------------------
    # Local Search Parameters
    # ---------------------------------------------------------------------
    - local_search_iterations: 100
      # Intensity of local optimization applied to trial vectors
      # Range: 50-200
      # Recommendation: 100 for memetic DE
      # Governs fine-tuning of candidate solutions post-mutation
      # Note: Converts DE to memetic algorithm (DE + local search)

    # ---------------------------------------------------------------------
    # Time Limit
    # ---------------------------------------------------------------------
    - time_limit: 60.0
    # VRPP Settings
    - profit_aware_operators: false
    - vrpp: true

    - must_go: ["other/mg_lookahead.yaml"]
    - post_processing: []
      # Wall-clock time limit in seconds
      # Range: 30.0-300.0
      # Recommendation: 60.0 for quick experiments
      # Algorithm terminates early if exceeded

# =============================================================================
# Mathematical Comparison: ABC vs DE
# =============================================================================
# ABC Employed Bee: v = x_i + φ(x_i - x_k)
#   - φ ∈ [-1, 1] random weight
#   - Single differential vector (x_i - x_k)
#   - No crossover parameter
#
# DE Mutation: v = x_r1 + F × (x_r2 - x_r3)
#   - F ∈ [0, 2] explicit differential weight
#   - Base vector x_r1 distinct from differential vectors
#   - Explicit crossover with CR parameter
#
# ABC Onlooker Bee: Fitness-proportionate (roulette wheel) selection
#   - Slower convergence due to probabilistic selection
#   - Weaker solutions get chances to reproduce
#
# DE Selection: Greedy one-to-one replacement
#   - Faster convergence due to deterministic selection
#   - Only improvements are kept
#
# ABC Scout Bee: Abandon sources if trials > limit
#   - Adds complexity with limit parameter
#   - Requires tuning of abandonment threshold
#
# DE: No abandonment mechanism
#   - Simpler algorithm
#   - Differential mutation provides sufficient diversity
# =============================================================================

# =============================================================================
# Performance Tuning Guide
# =============================================================================
# For SMALL instances (n < 50 nodes):
#   pop_size: 30, mutation_factor: 0.8, crossover_rate: 0.9, max_iterations: 300
#
# For MEDIUM instances (50 ≤ n < 150 nodes):
#   pop_size: 50, mutation_factor: 0.8, crossover_rate: 0.9, max_iterations: 500
#
# For LARGE instances (n ≥ 150 nodes):
#   pop_size: 100, mutation_factor: 0.7, crossover_rate: 0.95, max_iterations: 1000
#
# For QUICK exploration (prioritize speed):
#   pop_size: 20, mutation_factor: 1.0, crossover_rate: 0.8, max_iterations: 200
#
# For INTENSIVE search (prioritize quality):
#   pop_size: 100, mutation_factor: 0.5, crossover_rate: 0.95, max_iterations: 1000
# =============================================================================
