# Pure Island Model Genetic Algorithm Policy Configuration

# =============================================================================
# Pure Island Model GA Policy Configuration
# =============================================================================
# PURPOSE:
#   Multi-population genetic algorithm where isolated sub-populations (islands)
#   evolve independently with periodic migration. Uses only genetic operators
#   (crossover, mutation) without local search refinement.
#
# ALGORITHM:
#   1. Initialize K islands with N chromosomes each
#   2. For each generation:
#      a. Selection: Tournament selection within each island
#      b. Crossover: Recombine selected parents
#      c. Mutation: Perturb offspring
#      d. Replacement: Replace worst individuals with offspring
#      e. Migration: Periodically exchange best solutions between islands
#
# PERFORMANCE:
#   Island model maintains population diversity better than single-population
#   GA. Effective for multimodal problems where multiple local optima exist.
#   Pure genetic operators make it computationally cheaper than memetic variants.
#
# REFERENCE:
#   Whitley, D., Rana, S., & Heckendorn, R. B. (1998). "The island model genetic
#   algorithm: On separability, population size and convergence."
#   Journal of Computing and Information Technology, 7(1), 33-47.
#
# NOTE:
#   Originally mislabeled as "Soccer League Competition" using sports metaphors.
#   This is fundamentally an island model GA with tournament selection.
#
# TYPICAL USE CASES:
#   - Large routing instances (100-300 nodes)
#   - Problems requiring population diversity
#   - Parallel execution on multi-core systems
#   - Benchmarking against classical GAs
# =============================================================================

ga_pim:
  custom:
    # ---------------------------------------------------------------------
    # Island Topology
    # ---------------------------------------------------------------------
    - n_islands: 10
      # Number of independent sub-populations (K parameter)
      # Range: 2-20
      # Recommendation: 10 for balanced diversity/communication

    - island_size: 20
      # Population size per island (N parameter)
      # Range: 10-50
      # Recommendation: 20 for each island
      # Total population = n_islands × island_size

    # ---------------------------------------------------------------------
    # Selection and Replacement
    # ---------------------------------------------------------------------
    - tournament_size: 3
      # Number of individuals in tournament selection
      # Range: 2-7
      # Recommendation: 3 for moderate selection pressure

    - elitism_count: 2
      # Number of top individuals preserved per island
      # Range: 1-5
      # Recommendation: 2 for elite preservation

    # ---------------------------------------------------------------------
    # Genetic Operators
    # ---------------------------------------------------------------------
    - crossover_rate: 0.8
      # Probability of applying crossover operator
      # Range: 0.5-1.0
      # Recommendation: 0.8 (standard GA setting)

    - mutation_rate: 0.2
      # Probability of applying mutation operator
      # Range: 0.05-0.5
      # Recommendation: 0.2 for balanced exploration

    # ---------------------------------------------------------------------
    # Migration Parameters
    # ---------------------------------------------------------------------
    - migration_interval: 10
      # Generations between inter-island migration
      # Range: 5-20
      # Recommendation: 10 for periodic diversity injection
      # Lower values increase communication overhead

    - migration_size: 2
      # Number of best individuals migrated per interval
      # Range: 1-5
      # Recommendation: 2 for moderate information sharing

    # ---------------------------------------------------------------------
    # Runtime Control
    # ---------------------------------------------------------------------
    - max_generations: 100
      # Maximum number of evolution cycles
      # Range: 50-500
      # Recommendation: 100 for production

    - time_limit: 60.0
      # Maximum wall-clock seconds for optimization
      # Range: 10-600 (0 = unlimited)
      # Recommendation: 60s for production

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - engine: "custom"
      # Execution backend: logic/src/policies/genetic_algorithm_pure_island_model/

    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options: mg_lookahead.yaml, mg_last_minute_*.yaml, mg_regular.yaml
      # See: docs/MUST_GO_STRATEGIES.md

    - post_processing: []
      # Route refinement heuristics applied after optimization
      # Empty list = use raw output
      # Options: ["2opt_intra", "relocate", "swap"]

# =============================================================================
# ALGORITHM STRUCTURE
# =============================================================================
# Each generation (for each island):
#   1. Selection: Tournament selection within island
#   2. Crossover: Apply recombination with probability crossover_rate
#   3. Mutation: Perturb offspring with probability mutation_rate
#   4. Replacement: Keep elitism_count best + new offspring
#   5. Migration (every migration_interval generations):
#      - Send migration_size best individuals to neighboring islands
#      - Replace worst individuals with immigrants
#
# Complexity:
#   - Space: O(K × N × n) for island populations
#   - Time per generation: O(K × N × n²) for genetic operators
#   - Parallelizable: Each island can evolve independently
#
# Interpretation of "Soccer League" Metaphor:
#   - "Soccer Teams" → Sub-populations (islands)
#   - "Players" → Chromosomes/decision variables
#   - "Matches" → Fitness evaluations
#   - "Player Transfers" → Migration operators
#   - "Relegation" → Worst-solution replacement
# =============================================================================
