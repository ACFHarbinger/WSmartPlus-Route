# Policy Configuration
# =============================================================================
# SA (Simulated Annealing) Policy Configuration
# =============================================================================
# PURPOSE:
#   Classic Boltzmann acceptance with geometric cooling schedule.
#   High temperature = random walk; low temperature = greedy descent.
# =============================================================================

sa:
  custom:
    - initial_temp: 100.0
    - alpha: 0.995
    - min_temp: 0.01
    - n_removal: 2
    - n_llh: 5
    - max_iterations: 500
    - time_limit: 60.0
    - engine: "custom"
    - must_go: ["other/mg_lookahead.yaml"]
    - post_processing: []
