# Policy Configuration

# =============================================================================
# HVPL (Hybrid Volleyball Premier League) Policy Configuration
# =============================================================================
# PURPOSE:
#   Population-based metaheuristic inspired by the Volleyball Premier League
#   competition structure. Combines ACO for intelligent initialization with
#   ALNS for deep local search (coaching), and a league-style population
#   management system for balanced exploration/exploitation.
#
# ALGORITHM:
#   1. Initialization: ACO constructs diverse initial solutions (teams)
#   2. Coaching: ALNS applies destroy-repair operators to improve each team
#   3. League Play: Population-level competition and ranking
#   4. Substitution: Replace weakest teams with fresh ACO solutions
#   5. Pheromone Update: Reinforce edges from best solutions
#
# KEY FEATURES:
#   - ACO-driven initialization provides diversity
#   - ALNS coaching for intensive local search
#   - Population management balances exploration/exploitation
#   - Pheromone feedback connects ACO and population evolution
#
# TYPICAL USE CASES:
#   - Medium-to-large instances (50-200 nodes)
#   - Production routing with 60s time budget
#   - When both ACO diversity and ALNS depth are needed
#
# PERFORMANCE EXPECTATIONS:
#   - Competitive with pure ALNS and HGS
#   - Better diversity than pure ALNS due to ACO initialization
#   - Diminishing returns beyond 120s time budget
# =============================================================================

hvpl:
  custom:
    # ---------------------------------------------------------------------
    # VPL League Parameters
    # ---------------------------------------------------------------------
    - n_teams: 10
      # Number of solutions (teams) in the league population
      # Range: 5-20 (5 = fast, 10 = balanced, 20 = thorough)
      # Larger populations → better diversity but slower iterations

    - max_iterations: 50
      # Number of league seasons (main loop iterations)
      # Range: 20-100 (20 = quick, 50 = balanced, 100 = deep)
      # Usually time_limit is reached first

    - sub_rate: 0.2
      # Fraction of weakest teams replaced per iteration
      # Range: 0.1-0.5 (0.1 = conservative, 0.3 = aggressive turnover)
      # Higher values → more diversity but risk losing good solutions

    - time_limit: 60
      # Maximum wall-clock seconds for the full algorithm
      # Range: 30-300 (30s = quick, 60s = production, 300s = benchmark)

    # ---------------------------------------------------------------------
    # ACO Parameters (Initialization & Substitution)
    # ---------------------------------------------------------------------
    - aco_n_ants: 10
      # Number of ants for solution construction
      # Range: 5-30 (10 = balanced for initialization phase)

    - aco_k_sparse: 10
      # Number of nearest neighbors in sparse ACO graph
      # Range: 5-20

    - aco_alpha: 1.0
      # Weight of pheromone in path selection
      # Range: 0.0-5.0 (1.0 = balanced)

    - aco_beta: 2.0
      # Weight of heuristic information in path selection
      # Range: 0.0-5.0 (2.0 = balanced)

    - aco_rho: 0.1
      # Pheromone evaporation rate
      # Range: 0.05-0.3

    - aco_q0: 0.9
      # Probability of choosing the best edge in path selection
      # Range: 0.0-1.0 (0.9 = balanced)

    - aco_tau_0: 0.1
      # Initial pheromone level
      # Range: 0.001-1.0 (0.1 = balanced)

    - aco_tau_min: 0.001
      # Minimum pheromone level
      # Range: 0.0001-0.1 (0.001 = balanced)

    - aco_tau_max: 10.0
      # Maximum pheromone level
      # Range: 1.0-100.0 (10.0 = balanced)

    - aco_iterations: 1
      # ACO iterations per construction call
      # Range: 1-5 (1 = single pass, used for fast initialization)

    - aco_local_search: False
      # Whether to perform local search within ACO
      # Range: True/False (False = use ALNS for local search)

    - aco_local_search_iterations: 0
      # Number of local search iterations per ACO construction
      # Range: 0-100 (0 = no local search)

    - aco_elitist_weight: 1.0
      # Weight of elitist ant in pheromone update
      # Range: 0.0-5.0 (1.0 = balanced)

    - aco_time_limit: 30
      # Maximum wall-clock seconds for the full algorithm
      # Range: 30-300 (60s = production, 120s = thorough)

    # ---------------------------------------------------------------------
    # ALNS Parameters (Coaching Phase)
    # ---------------------------------------------------------------------
    - alns_iterations: 100
      # Number of destroy-repair cycles per coaching session
      # Range: 50-500 (50 = light, 100 = balanced, 500 = deep)

    - alns_start_temp: 100.0
      # Initial simulated annealing temperature
      # Range: 50-500

    - alns_cooling_rate: 0.95
      # Temperature decay per iteration
      # Range: 0.90-0.99

    - alns_reaction_factor: 0.5
      # Weight of reaction factor in simulated annealing
      # Range: 0.1-2.0 (0.5 = balanced)

    - alns_min_removal: 1
      # Minimum number of nodes to remove in destroy phase
      # Range: 1-10

    - alns_max_removal_pct: 0.2
      # Maximum fraction of nodes to remove in destroy phase
      # Range: 0.1-0.4

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - engine: "custom"
      # Execution backend: logic/src/policies/hybrid_volleyball_premier_league/

    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options: mg_lookahead.yaml, mg_last_minute_*.yaml, mg_regular.yaml

    - post_processing: []
      # ALNS coaching provides comprehensive local search
      # Empty = use HVPL output directly
# =============================================================================
