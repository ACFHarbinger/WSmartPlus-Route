# Hybrid Memetic Search (HMS) Policy Configuration

# =============================================================================
# Hybrid Memetic Search (HMS) Policy Configuration
# =============================================================================
# PURPOSE:
#   Advanced multi-phase hybrid solver combining ACO, GA, and ALNS.
#   Seeding with ACO, global evolution with GA (HGS variant), and
#   intensive refinement with ALNS.
#
# ALGORITHM:
#   1. Seeding: Initialize population using ACO construction.
#   2. Evolution: Iterative GA-style reproduction with crossover and mutation.
#   3. Substitution: Periodic replenishment from a passive reserve pool.
#   4. Refinement: Intensive ALNS coaching for best individuals.
#
# PERFORMANCE:
#   State-of-the-art hybrid metaheuristic that provides performance parity
#   with HVPL but uses a rigorous, metaphor-free structure.
#
# TYPICAL USE CASES:
#   - Large routing instances (150-500 nodes)
#   - Production deployment requiring best-in-class solutions
#   - Benchmarking against Specialized solvers like HGS
# =============================================================================

hms:
  custom:
    # ---------------------------------------------------------------------
    # Population Parameters
    # ---------------------------------------------------------------------
    - population_size: 10
      # Number of active chromosomes (individuals)
      # Range: 10-50 (10 = fast, 30 = balanced, 50 = thorough)
      # NOTE: Aligned with HVPL n_teams for exact equivalence

    - max_generations: 50
      # Number of evolution cycles
      # Range: 50-200 (50 = quick, 100 = balanced, 200 = deep)
      # NOTE: Aligned with HVPL max_iterations for exact equivalence

    - substitution_rate: 0.2
      # Fraction of weakest individuals replaced per generation
      # Range: 0.1-0.5 (0.2 = balanced)

    # ---------------------------------------------------------------------
    # Genetic Operators
    # ---------------------------------------------------------------------
    - crossover_rate: 0.8
      # Probability of recombination per generation
      # Range: 0.5-1.0 (0.8 = balanced)

    - mutation_rate: 0.1
      # Probability of perturbation after crossover
      # Range: 0.05-0.3 (0.1 = light)

    - elitism_count: 3
      # Number of elite individuals preserved
      # Range: 1-10 (3 = minimum)

    # ---------------------------------------------------------------------
    # Integration Parameters
    # ---------------------------------------------------------------------
    - aco_init_iterations: 50
      # ACO iterations for Phase 1 initialization
      # Range: 20-100 (50 = balanced)

    # ---------------------------------------------------------------------
    # Global Parameters
    # ---------------------------------------------------------------------
    - time_limit: 60
      # Maximum wall-clock seconds
      # Range: 60-600 (300s = production)

    - seed: null
      # Random seed (null = random)

    # ---------------------------------------------------------------------
    # ACO Nested Configuration (Initialization)
    # ---------------------------------------------------------------------
    - aco:
        n_ants: 10
        # Number of ants for construction (Range: 10-50)

        k_sparse: 10
        # Nearest neighbors in sparse graph (Range: 5-20)

        alpha: 1.0
        # Pheromone weight (Range: 0.5-2.0)

        beta: 2.0
        # Heuristic weight (Range: 1.0-5.0)

        rho: 0.1
        # Evaporation rate (Range: 0.05-0.3)

        q0: 0.9
        # Exploitation probability (Range: 0.7-0.95)

        tau_0: 1.0
        # Initial pheromone (Range: 0.01-1.0)

        tau_min: 0.001
        # Minimum pheromone (Range: 0.0001-0.01)

        tau_max: 10.0
        # Maximum pheromone (Range: 1.0-100.0)

        max_iterations: 1
        # ACO iterations per construction (Range: 1-5)

        local_search: False
        # Local search in ACO (ALNS handles local search)

        local_search_iterations: 0
        # Local search iterations (Range: 0-500)

        elitist_weight: 1.0
        # Elitist ant weight (Range: 0.5-2.0)

        time_limit: 30.0
        # ACO time limit in seconds (Range: 30-300)

    # ---------------------------------------------------------------------
    # ALNS Nested Configuration (Coaching)
    # ---------------------------------------------------------------------
    - alns:
        max_iterations: 100
        # Number of destroy-repair cycles (Range: 50-500)

        start_temp: 100.0
        # Initial SA temperature (Range: 50-500)

        cooling_rate: 0.95
        # Temperature decay per iteration (Range: 0.90-0.99)

        reaction_factor: 0.5
        # Weight update reaction factor (Range: 0.05-0.3)

        min_removal: 1
        # Minimum nodes removed (Range: 1-10)

        max_removal_pct: 0.2
        # Maximum removal fraction (Range: 0.1-0.4)

        time_limit: 60.0
        # ALNS time limit in seconds (Range: 30-300)

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - engine: "custom"
      # Execution backend: logic/src/policies/genetic_algorithm_memetic_island_model/

    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options: mg_lookahead.yaml, mg_last_minute_*.yaml, mg_regular.yaml
      # See: docs/MUST_GO_STRATEGIES.md

    - post_processing: []
      # Route refinement heuristics applied after optimization
      # Empty list = use raw output
      # Note: ALNS already provides comprehensive local search

# =============================================================================
# ALGORITHM STRUCTURE
# =============================================================================
# Initialization:
#   1. Use ACO to construct initial population for each island
#
# Each generation (for each island):
#   1. Local Improvement: Apply ALNS to all individuals in island
#   2. Fitness Evaluation: Compute objective values
#   3. Migration (every migration_interval generations):
#      - Send migration_size best to neighboring islands
#      - Replace worst with immigrants
#   4. Replacement:
#      - Tournament selection with tournament_size competitors
#      - Replace replacement_rate fraction of weakest individuals
#
# Complexity:
#   - Space: O(K × N × n) for island populations
#   - Time per generation: O(K × N × ALNS_cost)
#   - Highly parallelizable: Islands evolve independently
#
# Key Differences from Pure Island GA:
#   - ACO construction instead of random initialization
#   - ALNS local search on every individual (memetic learning)
#   - Typically better solution quality but higher computational cost
#
# Interpretation of Sports Metaphors:
#   - "Teams" → Islands (sub-populations)
#   - "Matches" → Fitness evaluations
#   - "Seasons" → Generations
#   - "Coaching" → ALNS local search operator
#   - "Relegation/Promotion" → Tournament-based replacement
# =============================================================================
