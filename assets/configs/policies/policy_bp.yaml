# Policy Configuration

# =============================================================================
# BP (Branch-and-Price) Column Generation Configuration
# =============================================================================
# PURPOSE:
#   Exact optimization using column generation for large-scale VRPP.
#   Handles exponentially many routes by generating only promising columns
#   through iterative pricing subproblem solving.
#
# ALGORITHM:
#   1. Master Problem: Set partitioning formulation (select routes)
#      - Variables: λ_k ∈ {0,1} for each route k
#      - Constraints: Each node covered exactly once
#      - Objective: Maximize total profit
#
#   2. Column Generation Loop:
#      a. Solve LP relaxation of restricted master
#      b. Extract dual values (π_i for each node i)
#      c. Solve pricing subproblem: Find route with max reduced cost
#         reduced_cost = profit - Σ_i π_i
#      d. Add profitable routes to master
#      e. Repeat until no routes with positive reduced cost
#
#   3. Pricing Subproblem: Resource-Constrained Shortest Path (RCSPP)
#      - Find route maximizing reduced cost
#      - Subject to capacity constraints
#      - Elementary path requirement (no node repetition)
#
#   4. Branch-and-Bound: Solve IP after column generation
#      - Ryan-Foster branching (not yet implemented)
#      - Direct IP solving on generated columns
#
# BACKEND:
#   Uses Gurobi for master problem, greedy heuristic for pricing subproblem.
#   Full RCSPP solver with dynamic programming planned for future release.
#
# TYPICAL USE CASES:
#   - Large instances (100-500 nodes) with sparse optimal routes
#   - Problems where compact formulations have weak LP bounds
#   - Research on column generation and Dantzig-Wolfe decomposition
#   - Applications requiring strong LP bounds for branch-and-bound
#
# PERFORMANCE EXPECTATIONS:
#   - 50 nodes: LP bound in 5-20 seconds, optimal in 10-60 seconds
#   - 100 nodes: LP bound in 20-120 seconds, optimal in 60-600 seconds
#   - 200 nodes: LP bound in 60-300 seconds, IP solving may timeout
#   - Convergence: Typically 20-100 iterations depending on problem
#
# COLUMN GENERATION BENEFITS:
#   1. Tighter LP bounds than compact formulations
#   2. Scalable to huge solution spaces (exponential routes)
#   3. Natural decomposition into master and pricing
#   4. Eliminates symmetry in route selection
#
# ADVANTAGES OVER BC:
#   - Handles larger instances (200+ nodes)
#   - Better LP bounds (Dantzig-Wolfe reformulation)
#   - More scalable to sparse problems
#   - Natural for set partitioning structure
#
# WHEN TO USE BP vs BC:
#   - BP: Sparse graphs, many nodes, few routes in optimal solution
#   - BC: Dense graphs, medium size, tight capacity constraints
#
# IMPLEMENTATION NOTES:
#   Current pricing uses greedy heuristic (polynomial time).
#   Exact RCSPP via dynamic programming planned for future versions.
#   Ryan-Foster branching not yet implemented (direct IP solving used).
#
# WARNING:
#   Requires Gurobi license (commercial or academic).
#   Pricing subproblem is NP-hard (exact solving computationally expensive).
# =============================================================================

bp:
  gurobi:
    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - time_limit: 60
      # Maximum wall-clock seconds before termination
      # Range: 60-3600 (60s = quick test, 3600s = thorough search)
      # BP may converge early if no new columns with positive reduced cost

    - max_iterations: 100
      # Maximum column generation iterations per node
      # Range: 50-500 (50 = quick convergence, 500 = exhaustive search)
      # Typical: 20-100 iterations for most problems
      # Stopping condition: No columns with reduced cost > optimality_gap

    - max_routes_per_iteration: 10
      # Maximum routes to generate per pricing call
      # Range: 1-50 (1 = sequential, 50 = batch generation)
      # Higher values add more diversity but may slow down master solving
      # Recommended: 5-10 for balance between convergence speed and master size

    - optimality_gap: 0.0001
      # Convergence tolerance for column generation
      # Column generation stops when max reduced cost < optimality_gap
      # Range: 1e-6 to 1e-2
      #   - 1e-6: Very tight (slow convergence, strong bounds)
      #   - 1e-4: Standard (good balance)
      #   - 1e-2: Loose (fast convergence, weaker bounds)

    - use_ryan_foster_branching: false
      # Enable Ryan-Foster branching for set partitioning
      # true = Branch on node pairs (together/separate) - NOT YET IMPLEMENTED
      # false = Direct IP solving after column generation (current behavior)
      # Note: Ryan-Foster branching preserves pricing subproblem structure

    - use_exact_pricing: false
      # Use exact RCSPP solver for pricing subproblem
      # true = Solve exact RCSPP using dynamic programming
      # false = Use greedy heuristic for pricing (current behavior)
      # Note: Exact pricing is NP-hard and may be slow for large problems

    - multi_day_mode: false
      # Whether to operate in multi-period stochastic mode.
      # If true, the policy evaluates single stages of a larger scenario tree or SDP.
      # If false, it functions as a standard single-day deterministic solver.

    # ---------------------------------------------------------------------
    # Must-Go Strategy
    # ---------------------------------------------------------------------
    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options:
      #   - mg_lookahead.yaml: Predict overflow within N days
      #   - mg_last_minute_*.yaml: Collect when fill exceeds threshold
      #   - mg_regular.yaml: Fixed-frequency collection
      # See: docs/MUST_GO_STRATEGIES.md

    # VRPP Settings
    - vrpp: true

    # ---------------------------------------------------------------------
    # Post-Processing
    # ---------------------------------------------------------------------
    - post_processing: []
      # Route refinement heuristics (not needed for exact solutions)
      # Always empty for BP since solutions are already optimal

    # ---------------------------------------------------------------------
    # Advanced Column Generation Parameters (Implicit)
    # ---------------------------------------------------------------------
    # Master problem solver parameters configured in:
    #   logic/src/policies/branch_and_price/master_problem.py
    #
    # Key implicit settings:
    #   - LP solver: Gurobi simplex with column generation
    #   - Variable type: Binary (λ_k ∈ {0,1})
    #   - Objective sense: Maximize (profit)
    #   - Dual extraction: Pi values from coverage constraints
    #
    # Pricing subproblem parameters configured in:
    #   logic/src/policies/branch_and_price/pricing_subproblem.py
    #
    # Current pricing algorithm:
    #   - Method: Greedy construction with dual-guided insertion
    #   - Time complexity: O(n^2) per route
    #   - Optimality: Heuristic (may not find all improving columns)
    #
    # Future pricing enhancements:
    #   - Exact RCSPP: Dynamic programming with bidirectional search
    #   - Labeling algorithm: Elementary shortest path with resources
    #   - Time complexity: O(n * C * K) for exact (C=capacity, K=routes)
    #
    # Column management:
    #   - Initial columns: Greedy routes from high-value nodes
    #   - Column pool: All generated routes (no deletion)
    #   - Reduced cost ordering: Best routes added first
    #
    # Convergence detection:
    #   - Criterion 1: max_reduced_cost < optimality_gap
    #   - Criterion 2: max_iterations reached
    #   - Criterion 3: time_limit exceeded
# =============================================================================
