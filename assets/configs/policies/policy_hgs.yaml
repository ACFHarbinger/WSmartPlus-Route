# HGS Policy Configuration

# =============================================================================
# HGS (Hybrid Genetic Search) Policy Configuration
# =============================================================================
# PURPOSE:
#   State-of-the-art metaheuristic combining genetic algorithm with local
#   search and Split algorithm. Consistently produces best-known solutions
#   for CVRP benchmarks. Recommended for production and benchmarking.
#
# ALGORITHM:
#   1. Maintain population of elite and diverse solutions
#   2. Crossover: OX operator to generate offspring
#   3. Local Search: 2-opt, relocate, swap on each offspring
#   4. Split: Optimal route partitioning from giant tour
#   5. Population Management: Biased fitness + diversity preservation
#
# PERFORMANCE:
#   Often matches or beats commercial solvers (Gurobi, CPLEX) on CVRP.
#   Published benchmarks show <1% gap on instances up to 500 nodes.
#
# REFERENCE:
#   Vidal et al. (2012) "A hybrid genetic algorithm for multidepot and
#   periodic vehicle routing problems" Operations Research 60(3):611-624
#
# TYPICAL USE CASES:
#   - Production deployment (60s budget yields excellent solutions)
#   - Academic benchmarking (compare against published results)
#   - Large instances (150-500 nodes) where exact methods fail
# =============================================================================

hgs:
  custom:
    # ---------------------------------------------------------------------
    # Runtime Control
    # ---------------------------------------------------------------------
    - time_limit: 60
      # Maximum wall-clock seconds for optimization
      # Range: 30-600 (30s = quick, 300s = thorough, 600s = benchmark)
      # Recommendation: 60s for production (CONSERVATIVE)

    - local_search_iterations: 500
      # Number of iterations to run local search
      # Range: 50-2000
      # Recommendation: 500 for stable optimization (CONSERVATIVE)

    # ---------------------------------------------------------------------
    # Population Management
    # ---------------------------------------------------------------------
    - population_size: 50
      # Total individuals in genetic pool (elite + diverse)
      # Range: 25-100
      # Larger populations → better diversity but slower iterations
      # Recommendation: 50 for stable optimization (CONSERVATIVE)

    - elite_size: 10
      # Number of top solutions preserved across generations
      # Range: 5-25 (typically 20% of population_size)
      # Elite solutions drive intensification (exploitation)

    - alpha_diversity: 0.5
      # Weight of diversity in fitness calculation
      # Range: 0.0-1.0 (0.0 = pure profit, 1.0 = pure diversity)
      # Note: Uses adaptive_diversity=true for dynamic adjustment

    - min_diversity: 0.2
      # Minimum diversity threshold for triggering diversity maintenance
      # Range: 0.0-1.0
      # Recommendation: 0.2 for stable optimization (CONSERVATIVE)

    - diversity_change_rate: 0.05
      # Rate at which alpha diversity changes
      # Range: 0.01-0.1
      # Recommendation: 0.05 for stable optimization (CONSERVATIVE)

    - survivor_threshold: 2
      # Threshold for survivor selection
      # Range: 1-10
      # Recommendation: 2 for stable optimization (CONSERVATIVE)

    - no_improvement_threshold: 20
      # Number of generations without improvement to trigger diversity maintenance
      # Range: 10-50
      # Recommendation: 20 for stable optimization (CONSERVATIVE)

    - neighbor_list_size: 10
      # Number of nearest neighbors to consider

    - min_diversity_threshold: 0.2
      # Threshold for minimum diversity
      # Range: 0.0-1.0 (0.0 = pure profit, 1.0 = pure diversity)

    # ---------------------------------------------------------------------
    # Genetic Operators
    # ---------------------------------------------------------------------
    - mutation_rate: 0.2
      # Probability of applying random swap/insert after crossover
      # Range: 0.0-0.5 (0.0 = pure crossover, 0.5 = high randomness)
      # Recommendation: 0.2 for stable optimization (CONSERVATIVE)

    - crossover_rate: 0.7
      # Probability of applying crossover after mutation
      # Range: 0.0-1.0 (0.0 = pure mutation, 1.0 = pure crossover)
      # Recommendation: 0.7 for CVRP, 0.5 for VRPTW

    - n_generations: 100
      # Number of generations to run
      # Range: 50-500
      # Recommendation: 100 for stable optimization (CONSERVATIVE)

    # Crossover operator: Order Crossover (OX)
    #   - Preserves relative order from parents
    #   - Controlled by crossover_rate: 0.95 (hardcoded)
    # ---------------------------------------------------------------------
    # ENHANCED: Advanced Local Search Parameters (NEW)
    # ---------------------------------------------------------------------
    - use_cross_exchange: false
      # Enable cross-exchange (segment swaps between routes)

    - use_lambda_interchange: false
      # Enable λ-interchange neighborhood search

    - lambda_max: 2
      # Maximum segment length for λ-interchange

    - use_ejection_chains: false
      # Enable ejection chain moves (route minimization)

    # Local Search Operators (applied to all offspring):
    #   - 2-opt intra-route & inter-route (2-opt*)
    #   - 3-opt intra-route
    #   - Relocate inter-route
    #   - Swap inter-route & swap*
    #   - Or-opt (chains of 1-3 nodes)
    #   - Cross-exchange (segment swaps)
    #   - λ-interchange (systematic cross-exchange)
    #   - Ejection chains (route minimization)
    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - engine: "custom"
      # Execution backend: logic/src/policies/hybrid_genetic_search.py
      # Uses PyVRP library (https://pyvrp.org/)

    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options: mg_lookahead.yaml, mg_last_minute_*.yaml, mg_regular.yaml
      # See: docs/MUST_GO_STRATEGIES.md

    - post_processing: []
      # HGS local search is comprehensive; external post-processing redundant
      # Empty = use HGS output directly
# =============================================================================
