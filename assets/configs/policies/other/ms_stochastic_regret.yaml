# =============================================================================
# Must-Go Strategy: Stochastic Regret (Expected Overflow Volume)
# =============================================================================
# PURPOSE:
#   Select bins based on the mathematically exact expected amount of waste
#   that would overflow if collection is deferred to the next day.
#   Assumes normally distributed accumulation: X ~ N(mu, sigma^2).
#
# ALGORITHM (closed-form EOR):
#   E[max(0, X - c)] = sigma * phi(Z) + (mu - c) * (1 - Phi(Z))
#   where c = remaining capacity, Z = (c - mu) / sigma
#
#   Select bins where expected overflow > threshold (gamma parameter).
#
# PARAMETERS:
#   - strategy: "stochastic_regret" (required)
#   - threshold: Minimum expected overflow volume to trigger collection (default: 0.5)
#     Range: 0.0-10.0 (lower = more conservative)
#     Units match the fill level units (e.g., liters, kg)
#
# REQUIRES:
#   - accumulation_rates and std_deviations in SelectionContext
#
# USE CASES:
#   - Stochastic environments (SCWCVRP)
#   - When overflow cost is quantified and needs to be minimized
# =============================================================================

strategy: stochastic_regret
threshold: 0.5
