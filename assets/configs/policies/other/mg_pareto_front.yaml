# =============================================================================
# Must-Go Strategy: Pareto-Front (Bi-Objective Non-Dominated Sorting)
# =============================================================================
# PURPOSE:
#   Select all bins that lie on the non-dominated Pareto front in the
#   2D objective space of (urgency, routing cost). A bin is mandatory if
#   no other bin is simultaneously more urgent AND closer to the depot.
#
# ALGORITHM:
#   1. Pre-filter: Discard bins with days_to_overflow > threshold (not urgent enough)
#   2. For remaining bins, identify the non-dominated subset via pairwise check:
#      bin j dominates bin i iff: d_j <= d_i AND dist_j <= dist_i (strictly one)
#   3. Select all non-dominated bins
#
# PARAMETERS:
#   - strategy: "pareto_front" (required)
#   - threshold: Maximum days-to-overflow for a bin to be Pareto-evaluated (default: 7)
#     Range: 1-14 (controls how far-horizon bins are considered at all)
#
# REQUIRES:
#   - accumulation_rates and distance_matrix in SelectionContext
#
# USE CASES:
#   - Multi-objective routing with urgency and distance trade-offs
#   - Avoiding both overflows AND excessive detour costs
# =============================================================================

strategy: pareto_front
threshold: 7.0
max_fill: 100.0
