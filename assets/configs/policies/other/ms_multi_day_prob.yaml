# =============================================================================
# Must-Go Strategy: Multi-Day Overflow Probability
# =============================================================================
# PURPOSE:
#   Stochastically select bins that have a high probability of overflowing
#   within the next K days, given normally distributed accumulation rates.
#
# ALGORITHM:
#   1. Scale parameters: mu_k = mu * K, sigma_k = sigma * sqrt(K)
#   2. Compute overflow probability: P(Acc_{1:K} >= rem_capacity)
#   3. Select bins where P >= threshold (risk threshold)
#
# PARAMETERS:
#   - strategy: "multi_day_prob" (required)
#   - horizon_days: Number of days K (default: 3)
#     Range: 1-14 (1 = today's risk only, 7 = weekly risk)
#   - threshold: Minimum risk probability to trigger collection (default: 0.85)
#     Range: 0.5-1.0 (0.5 = collect if >50% chance, 0.95 = very conservative)
#
# REQUIRES:
#   - accumulation_rates and std_deviations in SelectionContext
#
# USE CASES:
#   - Stochastic environments (SCWCVRP) with uncertain fill rates
#   - Conservative risk management
# =============================================================================

strategy: multi_day_prob
horizon_days: 3
threshold: 0.85
max_fill: 100.0
