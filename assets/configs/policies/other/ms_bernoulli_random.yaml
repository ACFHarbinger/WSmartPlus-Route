# =============================================================================
# Mandatory Strategy: Bernoulli Trial Random Selection
# =============================================================================
# PURPOSE:
#   Stochastic null baseline where each bin is independently mandated
#   with a fixed probability p. Useful for validating that more complex
#   strategies actually provide value over random selection.
#
# ALGORITHM:
#   1. For each bin i, draw X_i ~ Bernoulli(p)
#   2. If X_i = 1, the bin is mandated for collection today
#   3. The realized set size |S| ~ Binomial(n, p)
#
# USE CASES:
#   - Sanity check baseline for all other strategies
#   - Memoryless selection benchmarking
#
# PARAMETERS:
#   - p: 0.5 (50% probability per bin)
#     Range: 0.0 to 1.0
# =============================================================================

strategy: bernoulli_random
p: 0.5
max_fill: 1.0
