# =============================================================================
# Must-Go Strategy: Spatial Synergy (Critical + Opportunistic Neighbors)
# =============================================================================
# PURPOSE:
#   Identify critically full bins and extend the mandatory set to include
#   nearby moderately full bins, amortizing future routing costs by collecting
#   them opportunistically in the same vicinity.
#
# ALGORITHM:
#   1. Identify "critical" bins: fill_ratio > critical_threshold
#   2. Identify "moderate" bins: fill_ratio > synergy_threshold
#   3. For each critical bin, find moderate bins within `radius` distance
#   4. Return union of all critical and synergy bins
#
# PARAMETERS:
#   - strategy: "spatial_synergy" (required)
#   - critical_threshold: Minimum fill ratio to be considered critical (default: 0.90)
#     Range: 0.7-1.0 (lower = more aggressively flagged as critical)
#   - synergy_threshold: Minimum fill ratio for opportunistic neighbors (default: 0.60)
#     Range: 0.4-0.8 (lower = more neighbors included)
#   - radius: Maximum distance to the critical bin to qualify as a synergy neighbor (default: 10.0)
#     Range: 1.0-50.0 (smaller = tighter spatial clustering)
#
# REQUIRES:
#   - distance_matrix in SelectionContext
#
# USE CASES:
#   - Dense urban routing with clustered bin placement
#   - Preventing multiple trips to the same neighborhood
# =============================================================================

strategy: spatial_synergy
critical_threshold: 0.90
synergy_threshold: 0.60
radius: 10.0
