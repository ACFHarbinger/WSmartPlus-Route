# =============================================================================
# Mandatory Strategy: Staggered Regular Selection
# =============================================================================
# PURPOSE:
#   Eliminates load spikes by staggering periodic collection across bins.
#   Distributes the workload uniformly over the collection period X.
#
# ALGORITHM:
#   1. Assign bin i phase φ_i = i % X
#   2. Collect bin i on day t if (t - 1) % X == φ_i
#   3. Approximately 1/X of all bins are collected daily
#
# USE CASES:
#   - Load-balanced temporal baseline
#   - Isolating the cost of ignoring fill-level vs spatial structure
#
# PARAMETERS:
#   - period: 3 (collect each bin every 3 days, staggered)
#     Range: 1+ (equivalent to Regular Selection frequency)
# =============================================================================

strategy: staggered_regular
period: 3
max_fill: 1.0
