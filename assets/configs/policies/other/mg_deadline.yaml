# =============================================================================
# Must-Go Strategy: Deadline-Driven (Exact Days-to-Overflow)
# =============================================================================
# PURPOSE:
#   Obligate collection for any bin whose guaranteed overflow is within
#   `horizon_days` days. Uses the deterministic floor formula:
#       d* = floor((tau - w_i) / mu_i) <= horizon_days
#
# ALGORITHM:
#   1. Compute remaining capacity per bin: rem = max_fill - current_fill
#   2. Compute days to overflow: d* = floor(rem / mu) for each bin
#   3. Select bins where d* <= horizon_days
#
# PARAMETERS:
#   - strategy: "deadline" (required)
#   - horizon_days: Lookahead window in simulation days (default: 2)
#     Range: 1-7 (1 = collect only bins overflowing tomorrow, 7 = week ahead)
#   - threshold: Alias for horizon_days when using MustGoConfig directly.
#     Range: 1-7
#
# REQUIRES:
#   - accumulation_rates in SelectionContext
#
# USE CASES:
#   - Strict enforcement of collection deadlines
#   - Deterministic environments without uncertainty
# =============================================================================

strategy: deadline
horizon_days: 2
threshold: 2.0
max_fill: 100.0
