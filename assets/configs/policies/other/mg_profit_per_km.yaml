# =============================================================================
# Must-Go Strategy: Profit-Per-Km (Spatial ROI)
# =============================================================================
# PURPOSE:
#   Select bins that are economically worthwhile to collect relative to
#   the distance cost. Normalizes expected revenue by round-trip distance
#   to the depot.
#
# ALGORITHM:
#   1. Compute expected mass: bin_volume * bin_density * (fill / max_fill)
#   2. Compute expected revenue: mass * revenue_kg
#   3. Compute profit_per_km = revenue / (2 * dist_to_depot)
#   4. Select bins where profit_per_km > threshold
#
# PARAMETERS:
#   - strategy: "profit_per_km" (required)
#   - threshold: Minimum profit per km to trigger collection (default: 0.5)
#     Range: 0.1-5.0 (lower = more aggressive collection)
#   - revenue_kg: Revenue per kg (default: 1.0)
#
# REQUIRES:
#   - distance_matrix in SelectionContext
#
# USE CASES:
#   - Economic VRP with revenue maximization
#   - Avoiding costly detours for low-value bins
# =============================================================================

strategy: profit_per_km
threshold: 0.5
revenue_kg: 1.0
max_fill: 100.0
