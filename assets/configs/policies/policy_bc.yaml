# Policy Configuration

# =============================================================================
# BC (Branch-and-Cut) Exact Solver Configuration
# =============================================================================
# PURPOSE:
#   Exact optimization using cutting planes and branch-and-bound.
#   Guarantees optimal solutions for small-to-medium instances (≤100 nodes)
#   using Gurobi MIP solver with custom separation algorithms.
#
# ALGORITHM:
#   1. Formulate VRPP as Mixed Integer Program (MIP)
#   2. Lazy Constraint Callback: Separate violated cutting planes
#      - Subtour Elimination Constraints (SEC)
#      - Capacity Inequalities
#      - Comb Inequalities (optional)
#   3. Branch-and-Bound: Solve to integer optimality
#   4. Primal Heuristics: Warm start with greedy construction
#
# BACKEND:
#   Uses Gurobi optimizer (v11.0+) with custom lazy constraint callbacks
#   for dynamic cut generation during branch-and-bound.
#
# TYPICAL USE CASES:
#   - Medium instances (50-100 nodes) where optimality proof is required
#   - Benchmark baseline for neural/metaheuristic comparison
#   - Research requiring provably optimal solutions
#   - Problems where strong cuts significantly tighten LP relaxation
#
# PERFORMANCE EXPECTATIONS:
#   - 20 nodes: Optimal in <2 seconds
#   - 50 nodes: Optimal in 10-60 seconds
#   - 100 nodes: Optimal in 60-600 seconds (depends on problem structure)
#   - 200+ nodes: May timeout (use Branch-and-Price or metaheuristics)
#
# CUTTING PLANES:
#   - Subtour Elimination: Prevents disconnected routes
#   - Capacity Cuts: Enforces vehicle load limits
#   - Comb Inequalities: Exponential family of facet-defining cuts
#
# ADVANTAGES OVER BPC:
#   - Custom separation algorithms (stronger than OR-Tools)
#   - Finer control over cut generation
#   - Better for VRPP-specific structure
#   - Access to Gurobi's advanced MIP features
#
# WHEN TO USE BC vs BP:
#   - BC: Better for dense graphs, tight capacity constraints
#   - BP: Better for sparse graphs, many potential routes, large instances
#
# WARNING:
#   Requires Gurobi license (commercial or academic).
#   May consume significant memory (>8GB) on large instances.
# =============================================================================

bc:
  gurobi:
    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - time_limit: 60
      # Maximum wall-clock seconds before termination
      # Range: 30-3600 (30s = quick test, 3600s = thorough search)
      # BC may prove optimality early and stop before time_limit

    - mip_gap: 0.0
      # Relative MIP optimality gap tolerance
      # 0.0 = prove optimality, 0.01 = stop at 1% gap
      # Range: 0.0-0.1 (0.0 for exact, 0.01-0.05 for faster termination)

    - use_heuristics: true
      # Enable primal heuristics for warm start
      # true = Use greedy + nearest neighbor + farthest insertion
      # false = Cold start from LP relaxation
      # Recommended: true (usually finds good solutions quickly)

    - use_exact_separation: false
      # Use exact max-flow/min-cut for subtour elimination
      # true = Exact separation (slower but finds all violated cuts)
      # false = Heuristic connected components (faster, may miss cuts)
      # Recommended: false for instances >100 nodes

    - max_cuts_per_round: 50
      # Maximum cuts to add per separation callback
      # Range: 10-100 (10 = conservative, 100 = aggressive)
      # Higher values may tighten LP but slow down solving

    - enable_fractional_capacity_cuts: true
      # Enable exact fractional capacity cut separation
      # true = Use O(V⁴) max-flow for fractional RCC separation (small instances)
      # false = Disable exact fractional capacity separation (large instances)
      # Recommended: true for n ≤ 75, false for n > 75
      # Note: Automatically disabled for instances with n > 75 regardless of setting
      #
      # Background:
      #   Exact separation of violated Capacity Cuts is strongly NP-hard.
      #   State-of-the-art solvers (Lysgaard et al. 2004) use specialized C++
      #   libraries (CVRPSEP) with shrinking heuristics to scale beyond n=100.
      #   This implementation uses max-flow heuristics which become a bottleneck
      #   for large instances. Disabling falls back to heuristic capacity cuts.

    # ---------------------------------------------------------------------
    # Must-Go Strategy
    # ---------------------------------------------------------------------
    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options:
      #   - mg_lookahead.yaml: Predict overflow within N days
      #   - mg_last_minute_*.yaml: Collect when fill exceeds threshold
      #   - mg_regular.yaml: Fixed-frequency collection
      # See: docs/MUST_GO_STRATEGIES.md

    # ---------------------------------------------------------------------
    # Post-Processing
    # ---------------------------------------------------------------------
    - post_processing: []
      # Route refinement heuristics (not needed for exact solutions)
      # Always empty for BC since solutions are already optimal

    # ---------------------------------------------------------------------
    # VRPP Settings
    # ---------------------------------------------------------------------
    - profit_aware_operators: false
      # Whether to use profit-aware insertion heuristics
      # true = Use farthest_profit_insertion
      # false = Use standard farthest_insertion

    - vrpp: true
      # Whether to use VRPP-specific pool expansion
      # true = Set expand_pool=true (consider all nodes)
      # false = Set expand_pool=false (consider only unassigned)

    # ---------------------------------------------------------------------
    # Stochastic Integer Routing Problem (SIRP) Settings
    # ---------------------------------------------------------------------
    - use_saa: false
      # Enable Sample Average Approximation (SAA) for Branch-and-Cut
      # true = Constructs a massive deterministic equivalent MILP.
      #        Warning: LP relaxations for SAA compact formulations are notoriously
      #                 weak and the solver may choke on scenario symmetry.
      #                 Included primarily for structural scaffolding and
      #                 Lot-Sizing separation stubs.
      # false = Solve standard deterministic routing problem.

    - num_scenarios: 10
      # Number of scenarios |Xi| for SAA sampling when use_saa=true.

    # ---------------------------------------------------------------------
    # Advanced Solver Parameters (Implicit)
    # ---------------------------------------------------------------------
    # Gurobi parameters configured in:
    #   logic/src/policies/branch_and_cut/solver.py
    #
    # Key implicit settings:
    #   - LazyConstraints: 1 (enable lazy constraint callback)
    #   - MIPFocus: 1 (balance feasibility and optimality)
    #   - Presolve: 2 (aggressive presolve)
    #   - Cuts: 2 (aggressive cut generation)
    #   - Heuristics: 0.05 (5% time on heuristics)
    #
    # Custom separation algorithms:
    #   - SEC Heuristic: Connected components (O(n))
    #   - SEC Exact: Max-flow/min-cut (O(n^3))
    #   - Capacity Cuts: Demand clustering (O(n^2))
    #   - Comb Inequalities: Greedy handle growth (O(n^3))
# =============================================================================
