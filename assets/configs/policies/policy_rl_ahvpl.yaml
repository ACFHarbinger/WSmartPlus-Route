# Policy Configuration

# =============================================================================
# RL-AHVPL (Reinforcement Learning Augmented Hybrid Volleyball Premier League)
# =============================================================================
# PURPOSE:
#   Advanced metaheuristic integrating four optimization components into a
#   unified engine, heavily driven by Reinforcement Learning:
#   ACO (initialization), VPL (population management), HGS (crossover),
#   and ALNS (local search).
#
# FULL COMPONENTS:
#   1. Q-Learning sparse ACO logic for initialization
#   2. ALNS enhanced with State-Action-Reward-State-Action (SARSA)
#   3. Contextual Multi-Armed Bandits (CMAB) for operator selection
#   4. Guided Local Search with penalties on edges
#   5. Reactive Tabu Search
# =============================================================================

rl_ahvpl:
  custom:
    # ---------------------------------------------------------------------
    # VPL League Parameters
    # ---------------------------------------------------------------------
    - n_teams: 10
      # Number of solutions (teams) in the league population
      # Range: 5-20 (5 = fast, 10 = balanced, 20 = thorough)

    - max_iterations: 1000
      # Number of league seasons (main loop iterations)

    - sub_rate: 0.2
      # Fraction of weakest teams replaced per iteration

    - time_limit: 60
      # Maximum wall-clock seconds for the full algorithm

    # ---------------------------------------------------------------------
    # HGS Parameters (Diversity Management & Crossover)
    # ---------------------------------------------------------------------
    - hgs_time_limit: 60
      # Maximum wall-clock seconds for the full algorithm

    - hgs_n_generations: 100
      # Number of generations for HGS

    - hgs_elite_size: 5
      # Number of elite solutions for biased fitness ranking

    - hgs_mutation_rate: 0.2
      # Probability of HGS local search mutation after ALNS coaching

    - hgs_crossover_rate: 0.7
      # Probability of applying OX crossover per generation

    - hgs_alpha_diversity: 0.1
      # Weight of diversity in fitness calculation

    - hgs_min_diversity: 0.2
      # Minimum diversity threshold for triggering diversity maintenance

    - hgs_diversity_change_rate: 0.05
      # Rate at which alpha diversity changes

    - hgs_no_improvement_threshold: 20
      # Number of generations without improvement

    - hgs_survivor_threshold: 2
      # Threshold for survivor selection

    - hgs_neighbor_list_size: 10
      # Number of nearest neighbors to consider

    - hgs_max_vehicles: 0
      # Maximum vehicles allowed (0 = unlimited, determined by problem)

    - hgs_population_size: 50
      # HGS internal population size for diversity management

    - hgs_local_search_iterations: 100
      # Number of local search iterations per generation

    # ---------------------------------------------------------------------
    # ACO Parameters (Initialization)
    # ---------------------------------------------------------------------
    - aco_n_ants: 10
      # Number of ants for solution construction

    - aco_k_sparse: 10
      # Number of nearest neighbors in sparse ACO graph

    - aco_alpha: 1.0
      # Weight of pheromone trail

    - aco_beta: 2.0
      # Weight of heuristic information

    - aco_rho: 0.1
      # Pheromone evaporation rate

    - aco_q0: 0.9
      # Probability of choosing the best edge in construction

    - aco_tau_0: 0.1
      # Initial pheromone level

    - aco_tau_min: 0.001
      # Minimum pheromone level

    - aco_tau_max: 10.0
      # Maximum pheromone level

    - aco_iterations: 1
      # ACO iterations per construction call

    - aco_local_search: False
      # Whether to apply local search after ACO construction

    - aco_local_search_iterations: 0
      # Number of local search iterations per construction call

    - aco_elitist_weight: 1.0
      # Weight of elitist ant in pheromone update

    - aco_time_limit: 30
      # Maximum wall-clock seconds for the full algorithm

    # ---------------------------------------------------------------------
    # ALNS Parameters (Local Search)
    # ---------------------------------------------------------------------
    - alns_iterations: 100
      # Number of destroy-repair cycles per coaching session

    - alns_start_temp: 100.0
      # Initial simulated annealing temperature

    - alns_cooling_rate: 0.95
      # Temperature decay per iteration

    - alns_reaction_factor: 0.1
      # Reaction factor for simulated annealing

    - alns_min_removal: 1
      # Minimum number of nodes to remove in destroy phase

    - alns_max_removal_pct: 0.2
      # Maximum fraction of nodes to remove in destroy phase

    - alns_time_limit: 60
      # Maximum wall-clock seconds for the full algorithm

    - alns_elite_iterations: 500
      # Number of destroy-repair cycles for elite solutions provided by HGS

    - alns_not_coached_iterations: 100
      # Number of destroy-repair cycles for non-elite solutions

    # ---------------------------------------------------------------------
    # RTS Parameters (Reactive Tabu Search)
    # ---------------------------------------------------------------------
    - rts_initial_tenure: 7
    - rts_min_tenure: 3
    - rts_max_tenure: 20
    - rts_tenure_increase: 1.5
    - rts_tenure_decrease: 0.9
    - rts_max_iterations: 500
    - rts_n_removal: 2
    - rts_n_llh: 5
    - rts_time_limit: 60.0
    - tabu_no_repeat_threshold: 2

    # ---------------------------------------------------------------------
    # GLS Parameters
    # ---------------------------------------------------------------------
    - gls_penalty_lambda: 1.0
    - gls_penalty_alpha: 0.5
    - gls_penalty_step: 10
    - gls_probability: 0.5

    # ---------------------------------------------------------------------
    # CMAB Parameters (Contextual Multi-Armed Bandit)
    # ---------------------------------------------------------------------
    - bandit_algorithm: "linucb"
    - bandit_max_iterations: 1000
    - bandit_quality_weight: 0.5
    - bandit_improvement_weight: 1.0
    - bandit_diversity_weight: 0.2
    - bandit_novelty_weight: 1.0
    - bandit_reward_threshold: 1.0e-6
    - bandit_default_reward: 5.0

    # ---------------------------------------------------------------------
    # CFE Parameters (Context Feature Extractor)
    # ---------------------------------------------------------------------
    - cfe_alpha: 0.1
    - cfe_feature_dim: 8
    - cfe_operator_selection_threshold: 1.0e-9
    - cfe_lambda_prior: 1.0
    - cfe_noise_variance: 0.1
    - cfe_epsilon: 0.15
    - cfe_epsilon_decay: 0.995
    - cfe_epsilon_decay_step: 20
    - cfe_epsilon_min: 0.05
    - cfe_diversity_history_size: 10
    - cfe_improvement_history_size: 10
    - cfe_operator_reward_size: 50
    - cfe_improvement_threshold: 1.0e-6

    # ---------------------------------------------------------------------
    # Q-Learning Parameters
    # ---------------------------------------------------------------------
    - qlearning_alpha: 0.1
    - qlearning_gamma: 0.9
    - qlearning_epsilon: 0.1
    - qlearning_epsilon_decay: 0.99
    - qlearning_epsilon_decay_step: 10
    - qlearning_epsilon_min: 0.05
    - qlearning_history_size: 10
    - qlearning_rewards_size: 20
    - qlearning_improvement_thresholds: [1.0e-4, -1.0e-4]

    # ---------------------------------------------------------------------
    # SARSA Parameters
    # ---------------------------------------------------------------------
    - sarsa_alpha: 0.1
    - sarsa_gamma: 0.95
    - sarsa_epsilon: 0.15
    - sarsa_epsilon_decay: 0.995
    - sarsa_epsilon_decay_step: 50
    - sarsa_epsilon_min: 0.05
    - sarsa_diversity_size: 10
    - sarsa_scores_size: 50
    - sarsa_qtable_size_rate: 0.5
    - sarsa_improvement_thresholds: [-1.0e-6, 1.0e-6]
    - sarsa_operator_progress_thresholds: [0.33, 0.67]
    - sarsa_operator_stagnation_thresholds: [10, 30]
    - sarsa_operator_diversity_thresholds: [0.3, 0.7]

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - engine: "custom"
      # Execution backend: logic/src/policies/reinforcement_learning_augmented_hybrid_volleyball_premier_league/

    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems

    - post_processing: []
      # ALNS + HGS local search is comprehensive; no further refinement needed
