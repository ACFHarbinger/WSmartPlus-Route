# Multi-Period Integer L-Shaped (MP-ILS-BD) Policy Configuration
# Reference: Laporte, G., & Louveaux, F. V. (1993). "The integer L-shaped method
# for stochastic integer programs with complete recourse."
# Operations Research Letters, 13(3), 133-142.

mp_ils_bd:
  # --- Standard ILS-BD parameters ---

  # Total solver time limit (seconds).
  time_limit: 300.0

  # Time limit per master problem solve (seconds).
  master_time_limit: 60.0

  # MIP optimality gap tolerance.
  mip_gap: 0.01

  # Maximum number of Benders outer iterations.
  max_iterations: 50

  # Lower bound on the recourse surrogate variable θ.
  theta_lower_bound: -1000000.0

  # Maximum constraint cuts per separation callback round.
  max_cuts_per_round: 10

  # Use heuristic capacity cut separation (RCC).
  enable_heuristic_rcc_separation: true

  # Enable comb inequality separation (increases cut quality at higher cost).
  enable_comb_cuts: false

  # Enable Gurobi output.
  verbose: false

  # --- Multi-period extensions ---

  # Planning horizon T (number of days).
  horizon: 7

  # Penalty per unit of inventory overflow per day.
  stockout_penalty: 500.0

  # Big-M constant for collection coupling: q_{it} <= M * y_{it}.
  # Should be at least as large as the maximum possible collection quantity.
  big_m: 10000.0

  # Use mean demand scenario for inventory balance constraints.
  # Stochastic recourse is handled in the Benders subproblem.
  mean_scenario_only: true

  # Initial fill level (%) for all bins at the start of the horizon.
  initial_inventory: 0.0

  # Random seed (for scenario sampling in the subproblem).
  seed: 42
