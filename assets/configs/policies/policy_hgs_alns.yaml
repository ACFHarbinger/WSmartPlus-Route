# Policy Configuration

# =============================================================================
# HGS-ALNS Hybrid Policy Configuration
# =============================================================================
# PURPOSE:
#   Combines Hybrid Genetic Search (HGS) with Adaptive Large Neighborhood
#   Search (ALNS) for enhanced solution quality. HGS provides global search;
#   ALNS refines elite solutions via destroy-repair operators.
#
# ALGORITHM:
#   1. Run HGS to build initial population
#   2. "Educate" elite solutions using ALNS (destroy-repair iterations)
#   3. Re-insert improved solutions into HGS population
#   4. Continue HGS evolution with enhanced individuals
#
# MOTIVATION:
#   HGS excels at exploring solution space but can plateau at local optima.
#   ALNS provides complementary diversification via adaptive operators.
#
# TYPICAL USE CASES:
#   - Challenging instances where pure HGS struggles (tight capacity, time windows)
#   - Benchmarking: Aim for best-known solutions with extended runtime
#   - Production: When extra compute budget (60s → 120s) is acceptable
#
# PERFORMANCE EXPECTATIONS:
#   - Often 0.5-1.5% better than pure HGS, at 50-100% higher runtime
#   - Diminishing returns beyond alns_education_iterations: 100
# =============================================================================

hgs_alns:
  custom:
    # ---------------------------------------------------------------------
    # Runtime Control
    # ---------------------------------------------------------------------
    - time_limit: 60
      # Maximum wall-clock seconds for full HGS-ALNS pipeline
      # Range: 60-600 (60s = production, 300s = thorough, 600s = benchmark)
      # Note: Shared between HGS phase and ALNS education phase

    # ---------------------------------------------------------------------
    # HGS Parameters (Diversity Management & Crossover)
    # ---------------------------------------------------------------------
    - hgs_time_limit: 60
      # Maximum wall-clock seconds for the full algorithm
      # Range: 30-300 (60s = production, 120s = thorough)

    - hgs_n_generations: 100
      # Number of generations for HGS
      # Range: 50-500 (50 = light, 100 = balanced, 500 = deep)

    - hgs_elite_size: 5
      # Number of elite solutions for biased fitness ranking
      # Range: 3-15 (typically ~50% of n_teams)
      # Elite solutions get higher diversity preservation

    - hgs_mutation_rate: 0.2
      # Probability of HGS local search mutation after ALNS coaching
      # Range: 0.0-0.5 (0.0 = no mutation, 0.3 = frequent)

    - hgs_crossover_rate: 0.7
      # Probability of applying OX crossover per generation
      # Range: 0.0-1.0 (0.0 = clone parent, 1.0 = always crossover)

    - hgs_alpha_diversity: 0.1
      # Weight of diversity in fitness calculation
      # Range: 0.0-1.0 (0.0 = pure profit, 1.0 = pure diversity)

    - hgs_max_vehicles: 0
      # Maximum vehicles allowed (0 = unlimited, determined by problem)
      # Set >0 to constrain fleet size

    - hgs_population_size: 50
      # HGS internal population size for diversity management
      # Range: 25-100

    - hgs_local_search_iterations: 100
      # Number of local search iterations per generation
      # Range: 50-500 (50 = light, 100 = balanced, 500 = deep)

    # ---------------------------------------------------------------------
    # ALNS Parameters (Coaching & Deep Local Search)
    # ---------------------------------------------------------------------
    - alns_iterations: 100
      # Number of destroy-repair cycles per coaching session
      # Range: 50-500 (50 = light, 100 = balanced, 500 = deep)

    - alns_start_temp: 100.0
      # Initial simulated annealing temperature
      # Range: 50-500

    - alns_cooling_rate: 0.95
      # Temperature decay per iteration
      # Range: 0.90-0.99

    - alns_reaction_factor: 0.1
      # Reaction factor for simulated annealing
      # Range: 0.05-0.3

    - alns_min_removal: 1
      # Minimum number of nodes to remove in destroy phase
      # Range: 1-10

    - alns_max_removal_pct: 0.2
      # Maximum fraction of nodes to remove in destroy phase
      # Range: 0.1-0.4

    - alns_time_limit: 60
      # Maximum wall-clock seconds for the full algorithm
      # Range: 30-300 (60s = production, 120s = thorough)

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - engine: "hgs_alns"
      # Execution backend: logic/src/policies/hybrid_genetic_search.py
      # Automatically coordinates HGS and ALNS phases

    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options: mg_lookahead.yaml, mg_last_minute_*.yaml, mg_regular.yaml
      # See: docs/MUST_GO_STRATEGIES.md

    - post_processing: []
      # HGS+ALNS local search is comprehensive; no further refinement needed
      # Empty = use hybrid output directly
# =============================================================================
