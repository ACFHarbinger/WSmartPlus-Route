# Continuous Local Search Policy Configuration

# =============================================================================
# Continuous Local Search (CLS) Policy Configuration
# =============================================================================
# PURPOSE:
#   Gradient-free continuous optimization with trigonometric perturbations
#   for VRP problems. Solutions are encoded as continuous vectors and
#   perturbed using sine/cosine functions for exploration/exploitation balance.
#
# ALGORITHM:
#   1. Encode routing solutions as continuous vectors
#   2. Apply trigonometric perturbations: x'[i] = x[i] + α × sin/cos(θ) × |β × x_best[i] - x[i]|
#   3. Decay step size α linearly from max_step_size to 0
#   4. Decode continuous vectors back to discrete routing solutions
#
# PERFORMANCE:
#   Gradient-free search effective for problems with multimodal landscapes.
#   Competitive with other metaheuristics for medium-sized instances.
#
# REFERENCE:
#   Originally marketed as "Sine Cosine Algorithm" but fundamentally is
#   continuous local search with trigonometric step functions.
#
# TYPICAL USE CASES:
#   - Problems where gradient information is unavailable
#   - Initial solution generation for hybrid approaches
#   - Benchmark comparison against swarm intelligence methods
# =============================================================================

cls:
  custom:
    # ---------------------------------------------------------------------
    # Population Parameters
    # ---------------------------------------------------------------------
    - population_size: 20
      # Number of solution vectors in population
      # Range: 10-100
      # Recommendation: 30 for balanced exploration/exploitation

    # ---------------------------------------------------------------------
    # Search Parameters
    # ---------------------------------------------------------------------
    - max_step_size: 2.0
      # Initial perturbation step size (α_max in update equations)
      # Range: 0.5-5.0
      # Recommendation: 2.0 (standard setting)
      # Note: Decays linearly to 0 over iterations

    # ---------------------------------------------------------------------
    # Runtime Control
    # ---------------------------------------------------------------------
    - max_iterations: 200
      # Maximum number of search iterations
      # Range: 100-1000
      # Recommendation: 500 for production

    - time_limit: 60.0
      # Maximum wall-clock seconds for optimization
      # Range: 10-600 (0 = unlimited)
      # Recommendation: 60s for production

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - engine: "custom"
      # Execution backend: logic/src/policies/continuous_local_search/

    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options: mg_lookahead.yaml, mg_last_minute_*.yaml, mg_regular.yaml
      # See: docs/MUST_GO_STRATEGIES.md

    - post_processing: []
      # Route refinement heuristics applied after optimization
      # Empty list = use raw output
      # Options: ["2opt_intra", "relocate", "swap"]

# =============================================================================
# MATHEMATICAL FOUNDATION
# =============================================================================
# Position update equations (randomly select one per dimension):
#   x'[i] = x[i] + r₁ × sin(r₂) × |r₃ × x_best[i] - x[i]|
#   x'[i] = x[i] + r₁ × cos(r₂) × |r₃ × x_best[i] - x[i]|
#
# where:
#   r₁ ∈ [0, α] - step size (α decays linearly: α = max_step_size × (1 - t/T))
#   r₂ ∈ [0, 2π] - random angle
#   r₃ ∈ [0, 2] - random coefficient
#   t = current iteration, T = max_iterations
#
# Complexity:
#   - Space: O(pop_size × n) for continuous population
#   - Time per iteration: O(pop_size × n) perturbation + O(n²) decoding
# =============================================================================
