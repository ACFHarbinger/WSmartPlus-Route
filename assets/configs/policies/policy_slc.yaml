# Policy Configuration

# =============================================================================
# SLC (Soccer League Competition) Policy Configuration
# =============================================================================
# PURPOSE:
#   Population-based metaheuristic inspired by football league competition.
#   Solutions are "players" organised into "teams". Intra-team perturbation
#   and inter-team competition (with OX crossover from winning teams) drive
#   both local intensification and global diversification.
#
# ALGORITHM:
#   1. Initialize n_teams * team_size players (route solutions)
#   2. Designate the global best solution as "superstar"
#   3. Per season (iteration):
#      a. Intra-team competition: each player applies random_removal +
#         greedy_insertion; replace if improved
#      b. Inter-team competition: pair teams; winner determined probabilistically
#         P_win = fit_A / (fit_A + fit_B); losing team's weakest player adopts
#         structure from winner's best via OX crossover
#      c. Stagnation check: if team fitness unchanged for stagnation_limit
#         seasons, regenerate entire team with fresh random solutions
#   4. Update superstar (global best); repeat for max_iterations
#
# KEY FEATURE:
#   Two-level competition (intra + inter-team) balances local search depth
#   with population-level diversity. Stagnation detection prevents teams from
#   getting trapped in local optima for extended periods.
#
# TYPICAL USE CASES:
#   - Medium instances (20-100 nodes)
#   - Research benchmarking of sports-inspired metaheuristics
#   - Comparison with LCA on league-structured population dynamics
#
# PERFORMANCE EXPECTATIONS:
#   - n_teams * team_size = total population; 5*4=20 is balanced default
#   - More teams → better diversity; larger team_size → deeper intra-team search
#   - stagnation_limit=5 gives responsive regeneration for 50 total iterations
# =============================================================================

slc:
  custom:
    # -------------------------------------------------------------------------
    # League Structure
    # -------------------------------------------------------------------------
    - n_teams: 5
      # Number of teams in the league
      # Range: 3-10 (3 = small league, 5 = balanced, 10 = diverse competition)

    - team_size: 4
      # Players per team (solutions per team)
      # Range: 2-8 (2 = minimal, 4 = balanced, 8 = deep per-team search)
      # Total population = n_teams * team_size

    - n_removal: 1
      # Nodes removed per intra-team perturbation step
      # Range: 1-4 (1 = micro perturbation, 3 = moderate shake)

    # -------------------------------------------------------------------------
    # Stagnation Management
    # -------------------------------------------------------------------------
    - stagnation_limit: 5
      # Seasons without team-level improvement before full team regeneration
      # Range: 3-20 (3 = aggressive restart, 10 = patient exploitation)
      # Keeps diversity alive; lower values → more team churn

    # -------------------------------------------------------------------------
    # Runtime Control
    # -------------------------------------------------------------------------
    - max_iterations: 50
      # Maximum seasons (main loop iterations)
      # Range: 20-200 (50 = production, 100 = benchmark)
      # Each season applies intra + inter competition for all teams

    - time_limit: 60.0
      # Maximum wall-clock seconds
      # Range: 10-300 (30s = quick, 60s = production, 120s = benchmark)

    - local_search_iterations: 500
      # Number of local search iterations
      # Range: 10-500 (10 = quick, 100 = production, 500 = benchmark)

    # -------------------------------------------------------------------------
    # Infrastructure Settings
    # -------------------------------------------------------------------------
    - engine: "custom"
      # Execution backend: logic/src/policies/soccer_league_competition/

    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options: mg_lookahead.yaml, mg_last_minute_*.yaml, mg_regular.yaml

    - post_processing: []
      # Intra-team local search and inter-team crossover are comprehensive
      # Empty = use SLC output directly
# =============================================================================
