# Policy Configuration
# =============================================================================
# GLS (Guided Large Neighborhood Search) Policy Configuration
# =============================================================================
# PURPOSE:
#   Bridges the Augmented Cost Function of GLS with LNS Ruin-and-Recreate.
#   Targeted destruction (penalized removal) mimics Fast Local Search.
#   When stagnation occurs, the features maximizing utility are penalized.
# =============================================================================

gls:
  custom:
    - lambda_param: 1.0
    - alpha_param: 0.3
    - penalty_cycles: 1000
    - inner_iterations: 100
    - fls_coupling_prob: 0.8
    - n_removal: 3
    - n_llh: 6
    - time_limit: 60.0
    # VRPP Settings
    - profit_aware_operators: false
    - vrpp: true

    - engine: "custom"
    - must_go: ["other/mg_lookahead.yaml"]
    - post_processing: []
