# Policy Configuration

# =============================================================================
# ARCO (Adaptive Route Constructor Orchestrator) Configuration
# =============================================================================
# PURPOSE:
#   Meta-constructor that runs a dynamically ordered chain of route
#   constructors, learning which ordering is most effective over time.
#   Each call selects a full permutation of the constructor pool using
#   adaptive pair-wise weights and updates those weights from the
#   per-step marginal improvement observed during execution.
#
# ALGORITHM:
#   At each simulation call ARCO performs three phases:
#
#   1. SELECTION — Build an ordered permutation of the constructor pool
#      using pair-wise transition weights  W[i, j]:
#        Step 1: choose c_0 from  w_first  (first-position scores).
#        Step k: choose c_k from  W[c_{k-1}, :]  masking already-chosen
#                constructors — sequential elimination with conditional
#                marginal probabilities.
#
#   2. EXECUTION — Run the selected chain, threading (tour, cost, profit,
#      contexts) forward exactly as SRC does. Each sub-constructor warm-
#      starts from its predecessor's output.
#
#   3. UPDATE — Observe per-step Δprofit (or Δcost) and apply EMA:
#        W[c_{k-1}, c_k] ← (1−α)·W[c_{k-1}, c_k] + α·sigmoid(Δ)
#      Weights persist across calls, so the orchestrator learns the best
#      constructor ordering for the current instance distribution.
#
# WEIGHT SEMANTICS:
#   w_first[i]    — desirability of constructor i as the first solver.
#   W[i, j]       — desirability of running j immediately after i.
#   All weights are initialised uniformly and updated online.
#   Diagonal of W is always 0 (a constructor cannot follow itself).
#
# SELECTION STRATEGIES:
#   epsilon_greedy  Best-weight constructor with prob (1-ε); uniform
#                   random with prob ε. Good balance of exploration and
#                   exploitation throughout a multi-day simulation.
#   greedy          Always pick the maximum-weight constructor. Use only
#                   after the weights have converged (late in training).
#   softmax         Boltzmann-proportional sampling. Smooth exploration;
#                   lower temperature → sharper, more greedy.
#
# PERFORMANCE:
#   - Overhead beyond SRC: negligible (~µs for weight lookups).
#   - Learning speed: typically stabilises within 20-50 simulation days.
#   - Best with ≥ 3 constructors; 2-constructor chains also supported.
#
# TYPICAL USE CASES:
#   - Rolling-horizon waste collection: learns daily ordering patterns.
#   - Benchmarking constructor compositions (ACO → HGS → ALNS, etc.).
#   - Replacing SRC when the optimal constructor order is unknown a priori.
#
# REFERENCE:
#   Cowling, P., Kendall, G., & Soubeiga, E. (2001). A hyper-heuristic
#   approach to scheduling a sales summit. PATAT III, LNCS 2079, 176–190.
#
#   Burke, E. K., et al. (2013). Hyper-heuristics: A survey of the state
#   of the art. Journal of the Operational Research Society, 64(12).
#
# REGISTRY KEY: "arco"
# =============================================================================

arco:
  # ---------------------------------------------------------------------------
  # Constructor Pool
  # ---------------------------------------------------------------------------
  - constructors: ["nn", "alns", "hgs"]
    # Registry names of route constructors to permute and execute.
    # ARCO selects an ordering of these at each call; the chain is always
    # a full permutation (every constructor runs exactly once per call).
    #
    # Recommended combinations:
    #   Fast chain   : ["nn", "alns"]
    #   Balanced     : ["nn", "alns", "hgs"]        ← default
    #   Deep search  : ["nn", "hgs", "alns", "bpc"]
    #   Neural-guided: ["na", "alns", "hgs"]
    #
    # Note: "nn" (nearest-neighbour) provides a fast warm-start; placing it
    # first allows downstream solvers to improve from a feasible baseline.

  # ---------------------------------------------------------------------------
  # Runtime Control
  # ---------------------------------------------------------------------------
  - time_limit: 120
    # Maximum wall-clock seconds for the entire ordered chain.
    # If a step completes after this budget is exceeded the chain is
    # aborted and the partial result is returned.
    # Range: 30-600 (30s = quick test, 120s = production, 300s = benchmark)
    # Note: the budget covers all sub-constructors combined, not each one.

  # ---------------------------------------------------------------------------
  # Selection Strategy
  # ---------------------------------------------------------------------------
  - selection_strategy: "epsilon_greedy"
    # How ARCO picks the next constructor at each position.
    #   "epsilon_greedy"  Recommended. Exploits best weights (1-ε) of the
    #                     time; explores uniformly with probability ε.
    #                     Robust for non-stationary instance distributions.
    #   "greedy"          Fully deterministic once weights converge.
    #                     May get stuck if weights converge prematurely.
    #   "softmax"         Smooth Boltzmann exploration. Pair with a low
    #                     temperature (0.5-1.0) for controlled randomness.

  - epsilon: 0.15
    # Exploration probability for epsilon_greedy ∈ [0.0, 1.0].
    # 0.0 = pure greedy (no exploration).
    # 0.15 = 15% random exploration (recommended for production).
    # 0.30 = aggressive exploration (good for the first 20 simulation days).
    # Ignored when selection_strategy is "greedy" or "softmax".

  - temperature: 1.0
    # Boltzmann temperature for softmax strategy > 0.
    # Lower values (0.1-0.5) → sharper distribution, more greedy.
    # Higher values (2.0-5.0) → flatter distribution, more random.
    # Ignored when selection_strategy is "epsilon_greedy" or "greedy".

  # ---------------------------------------------------------------------------
  # Online Learning Parameters
  # ---------------------------------------------------------------------------
  - alpha_ema: 0.15
    # EMA smoothing factor for weight updates ∈ (0.0, 1.0].
    # Controls how quickly ARCO reacts to new performance observations.
    # 0.05 = slow adaptation (stable, good for long simulations ≥ 60 days).
    # 0.15 = moderate adaptation (recommended, balances stability/reactivity).
    # 0.40 = fast adaptation (responsive, but susceptible to noise).

  - weight_init: 1.0
    # Initial value for all pair-wise transition weights.
    # All constructors start equally preferred; weights diverge through
    # online learning. Values > 1.0 slow early convergence; < 1.0 is
    # equivalent (only ratios matter after normalisation in softmax/EMA).

  - weight_floor: 0.01
    # Minimum allowed weight. Prevents any constructor transition from
    # having exactly 0 desirability, preserving permanent exploration
    # capacity even for consistently underperforming transitions.
    # Range: 0.001-0.1 (0.01 is a safe default).

  - decay: 1.0
    # Multiplicative weight decay applied at the start of every call ∈ (0, 1].
    # 1.0 = no decay (weights accumulate indefinitely; good for stationary
    #        distributions where the optimal ordering is fixed).
    # 0.99 = slow decay (weights half-life ≈ 69 calls; good for slowly
    #         drifting distributions, e.g. seasonal waste patterns).
    # 0.95 = aggressive decay (weights half-life ≈ 14 calls; use when the
    #         problem distribution changes rapidly across simulation windows).

  # ---------------------------------------------------------------------------
  # VRPP / Infrastructure Settings
  # ---------------------------------------------------------------------------
  - vrpp: true
    # Profit-aware routing mode (Vehicle Routing Problem with Profits).
    # Must match the mode of all sub-constructors in the pool.

  - mandatory_selection: ["other/ms_lookahead.yaml"]
    # Node selection strategy applied before the constructor chain runs.
    # Options: ms_lookahead.yaml, ms_last_minute_*.yaml, ms_regular_*.yaml
    # See: docs/MUST_GO_STRATEGIES.md

  - route_improvement: []
    # Optional post-chain local-search refinement applied to the final tour.
    # Empty = use the raw output of the last constructor in the chain.
    # Example: ["other/ac_bmc.yaml"] for a BMC acceptance criterion pass.

  # ---------------------------------------------------------------------------
  # Determinism
  # ---------------------------------------------------------------------------
  - seed: 42
    # Random seed for reproducible exploration decisions.
    # Change between independent runs to assess variance of learned orderings.

# =============================================================================
# PRESET OVERRIDES (copy the arco block and adjust to use these variants)
# =============================================================================
#
# --- FAST (2-constructor, greedy, no learning overhead) ---
#   constructors: ["nn", "alns"]
#   selection_strategy: "greedy"
#   time_limit: 60
#   alpha_ema: 0.20
#   decay: 1.0
#
# --- DEEP SEARCH (4-constructor, slow-learning) ---
#   constructors: ["nn", "hgs", "alns", "bpc"]
#   selection_strategy: "epsilon_greedy"
#   epsilon: 0.10
#   time_limit: 300
#   alpha_ema: 0.05
#   decay: 0.99
#
# --- EXPLORATION-HEAVY (early simulation days / cold start) ---
#   constructors: ["nn", "alns", "hgs"]
#   selection_strategy: "epsilon_greedy"
#   epsilon: 0.35
#   time_limit: 120
#   alpha_ema: 0.25
#   decay: 0.98
#
# --- SOFTMAX (smooth probabilistic control) ---
#   constructors: ["nn", "alns", "hgs"]
#   selection_strategy: "softmax"
#   temperature: 0.8
#   time_limit: 120
#   alpha_ema: 0.15
#   decay: 1.0
# =============================================================================
