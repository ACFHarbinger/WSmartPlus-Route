# Policy Configuration Override for Kernel Search Matheuristic
# =============================================================================
# KERNEL SEARCH (KS) - MATHEMATICAL PROGRAMMING DECOMPOSITION
# =============================================================================
#
# MISSION:
#   Kernel Search is a matheuristic framework that solves complex MILPs by
#   decomposing them into a sequence of restricted MIP sub-problems. It is
#   particularly effective for problems with a large number of binary variables,
#   where exact solvers might struggle to find high-quality incumbents quickly.
#
# STRATEGY:
#   1. INITIALIZATION: Identify a "Kernel" of the most promising variables
#      (e.g., those with fractional values > 0 in the LP relaxation).
#   2. ITERATIVE PARTITIONING: The remaining variables are sorted and
#      divided into several "Buckets".
#   3. INTENSIFICATION: Solve a MIP consisting of the current Kernel plus
#      one Bucket. If a better objective is found, the variables contributing
#      to the new solution are added to the Kernel permanently.
#
# ADVANTAGES:
#   - High Scalability: Handles large graphs by only exploring fractions of the model.
#   - Quality: Leverages Gurobi's exact branch-and-bound logic within a restricted space.
#   - Flexibility: Can be adapted to different sorting criteria (dual values, etc.).
#
# REFERENCE:
#   Angelelli, E., Mansini, R., & Speranza, M. G. (2010). "Kernel Search:
#   a new heuristic framework for portfolio selection".
# =============================================================================

ks:
  custom:
    # ---------------------------------------------------------------------
    # Decomposition Parameters
    # ---------------------------------------------------------------------
    - initial_kernel_size: 100
    # Number of decision variables (edges and nodes) to seed the initial
    # search space. These are chosen based on the LP relaxation scores.
    # Larger kernels provide better quality but increase iteration time.

    - bucket_size: 50
    # Number of variables to add to the kernel in each iterative phase.
    # Balanced buckets ensure that each sub-MIP is sufficiently restricted
    # while still allowing new variable combinations to be found.

    - max_buckets: 15
    # Maximum number of improvement iterations. Processing too many buckets
    # might yield diminishing returns and consume the total time budget.

    # ---------------------------------------------------------------------
    # Solver Parameters
    # ---------------------------------------------------------------------
    - time_limit: 300.0
    # Maximum total time (seconds) for the entire kernel search process.
    # The solver attempts to partition this budget across all sub-problems.

    - mip_limit_nodes: 10000
    # Branch-and-bound node limit for each individual sub-MIP execution.
    # This prevents a single difficult bucket from hanging the heuristic.

    - mip_gap: 0.01
    # Relative optimality gap tolerance for sub-MIPs. A 1% gap allows the
    # solver to return quickly once a "good enough" solution is found.

    # ---------------------------------------------------------------------
    # Integration & Feature Extensions
    # ---------------------------------------------------------------------
    - engine: "custom"
    # Specifies the use of the project's internal KernelSearchSolver engine.

    - must_go: ["other/mg_lookahead.yaml"]
    # Selection strategy for mandatory collections. Kernel Search will
    # ensure these nodes are included in the math model constraints.

    - post_processing: []
    # Optional local search refinement (e.g., ALNS or 2-opt) that can be
    # applied to the tour found by the matheuristic iterations.
# =============================================================================
