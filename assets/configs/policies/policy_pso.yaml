# Particle Swarm Optimization (PSO) with Velocity Momentum Policy Configuration

# =============================================================================
# PSO Policy Configuration - Rigorous Replacement for SCA
# =============================================================================
# PURPOSE:
#   **TRUE PARTICLE SWARM OPTIMIZATION** with inertia-weighted velocity updates.
#   This implementation includes ALL PSO components (Kennedy & Eberhart 1995):
#   - Velocity vectors with momentum
#   - Personal best (pbest) tracking per particle
#   - Global best (gbest) for the swarm
#   - Cognitive and social acceleration coefficients
#   - Linearly decreasing inertia weight
#
# WHY PSO REPLACES SCA:
#   The Sine Cosine Algorithm (SCA) is mathematically identical to PSO without
#   the velocity term, but with unnecessary computational overhead:
#
#   SCA Update: X' = X + r₁·sin(r₂)·|r₃·P - X|
#   PSO Social: X' = X + w·(G_best - X) where w is simple random weight
#
#   Problems with SCA:
#   1. sin(r₂) where r₂~U(0,2π) is just random weight ∈ [-1,1]
#   2. No periodicity exploitation (r₂ resampled every iteration)
#   3. cos/sin switch is redundant (same distribution, phase-shifted)
#   4. Expensive transcendental calls with zero optimization benefit
#
#   PSO Advantages:
#   1. Velocity maintains momentum from previous iterations (MISSING in SCA)
#   2. Personal best enables individual learning (MISSING in SCA)
#   3. Simpler, faster arithmetic operations
#   4. 30+ years of theoretical and empirical foundation
#
# ALGORITHM (Kennedy & Eberhart 1995):
#   1. Initialize swarm with random positions and velocities
#   2. For each iteration:
#      a. For each particle i:
#         - Update velocity: v(t+1) = w*v(t) + c₁*r₁*(pbest - x) + c₂*r₂*(gbest - x)
#         - Update position: x(t+1) = x(t) + v(t+1)
#         - Evaluate fitness f(x(t+1))
#         - Update personal best if f(x(t+1)) > f(pbest_i)
#      b. Update global best from all personal bests
#      c. Decrease inertia weight w linearly
#
# ENCODING:
#   - Continuous position vectors in [-1, 1]^n
#   - Sigmoid binarization for node selection
#   - Largest Rank Value (LRV) ordering
#
# PERFORMANCE:
#   Superior exploration-exploitation balance vs. SCA.
#   Linearly decreasing inertia: high w early (exploration) → low w late (exploitation).
#   Faster than SCA (no transcendental functions).
#
# REFERENCES:
#   Kennedy, J., & Eberhart, R. (1995). "Particle swarm optimization."
#   Proceedings of ICNN'95 - International Conference on Neural Networks.
#
#   Shi, Y., & Eberhart, R. (1998). "A modified particle swarm optimizer."
#   IEEE International Conference on Evolutionary Computation.
#
# TYPICAL USE CASES:
#   - Continuous optimization problems adapted to discrete routing
#   - Replacement for any SCA-based implementation
#   - Benchmarking against population-based metaheuristics
# =============================================================================

pso:
  custom:
    # ---------------------------------------------------------------------
    # Swarm Parameters
    # ---------------------------------------------------------------------
    - pop_size: 30
      # Number of particles in swarm
      # Range: 20-50
      # Recommendation: 30 for balanced exploration/exploitation
      # Note: SCA typically uses same population size

    # ---------------------------------------------------------------------
    # PSO Velocity Momentum Parameters (Kennedy & Eberhart 1995)
    # ---------------------------------------------------------------------
    - inertia_weight_start: 0.9
      # Initial inertia weight w(0) for exploration phase
      # Range: 0.7-1.0
      # Recommendation: 0.9 (standard PSO value)
      # High inertia early → particles explore freely
      # **MISSING IN SCA** - this is why PSO is superior

    - inertia_weight_end: 0.4
      # Final inertia weight w(T) for exploitation phase
      # Range: 0.2-0.5
      # Recommendation: 0.4 (standard PSO value)
      # Low inertia late → particles converge to best solutions

    - cognitive_coef: 2.0
      # Cognitive acceleration coefficient c₁ (personal best attraction)
      # Range: 1.0-3.0
      # Recommendation: 2.0 (standard PSO value)
      # Controls how much particle trusts its own experience
      # **MISSING IN SCA** - no personal best tracking

    - social_coef: 2.0
      # Social acceleration coefficient c₂ (global best attraction)
      # Range: 1.0-3.0
      # Recommendation: 2.0 (standard PSO value)
      # Controls how much particle follows swarm's best
      # SCA only has this term (via trigonometric wrapper)

    # ---------------------------------------------------------------------
    # Continuous Space Bounds
    # ---------------------------------------------------------------------
    - position_min: -1.0
      # Lower bound for position vector components
      # Range: -10.0 to 0.0
      # Recommendation: -1.0 (matches SCA bounds)

    - position_max: 1.0
      # Upper bound for position vector components
      # Range: 0.0 to 10.0
      # Recommendation: 1.0 (matches SCA bounds)

    - velocity_max: 0.5
      # Maximum velocity magnitude (velocity clamping)
      # Range: 0.1 to 2.0
      # Recommendation: 0.5 (prevents divergence)
      # Prevents particles from "overshooting" search space

    # ---------------------------------------------------------------------
    # Runtime Control
    # ---------------------------------------------------------------------
    - max_iterations: 500
      # Maximum number of PSO iterations
      # Range: 100-1000
      # Recommendation: 500 for production
      # Note: PSO typically converges faster than SCA

    - time_limit: 60.0
      # Maximum wall-clock seconds for optimization
      # Range: 10-600 (0 = unlimited)
      # Recommendation: 60s for production

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - engine: "custom"
      # Execution backend: logic/src/policies/particle_swarm_optimization/

    - must_go: ["other/mg_lookahead.yaml"]
      # Node selection strategy for waste collection problems
      # Options: mg_lookahead.yaml, mg_last_minute_*.yaml, mg_regular.yaml

    - post_processing: []
      # Route refinement heuristics applied after optimization
      # Empty list = use raw output
      # Options: ["2opt_intra", "relocate", "swap"]

# =============================================================================
# MATHEMATICAL FOUNDATION
# =============================================================================
# PSO Velocity Update Equation (Kennedy & Eberhart 1995):
#   v(t+1) = w*v(t) + c₁*r₁*(pbest - x(t)) + c₂*r₂*(gbest - x(t))
#
#   where:
#     w      = inertia weight (linearly decreasing)
#     v(t)   = current velocity
#     c₁     = cognitive_coef (personal best attraction)
#     c₂     = social_coef (global best attraction)
#     r₁, r₂ = random numbers ∈ [0,1]
#     pbest  = particle's personal best position
#     gbest  = swarm's global best position
#     x(t)   = current particle position
#
# PSO Position Update:
#   x(t+1) = x(t) + v(t+1)
#
# Inertia Weight Decay (Shi & Eberhart 1998):
#   w(t) = w_start - (w_start - w_end) × (t / T_max)
#
# Velocity Clamping:
#   v(t+1) = clip(v(t+1), -v_max, v_max)
#
# Position Clamping:
#   x(t+1) = clip(x(t+1), x_min, x_max)
#
# Complexity:
#   - Space: O(pop_size × n) for swarm + velocities + personal bests
#   - Time per iteration: O(pop_size × n) for velocity updates
#   - Faster than SCA: no sin/cos transcendental calls
#
# Mathematical Comparison PSO vs SCA:
#   PSO Full Equation:
#     v' = w*v + c₁*r₁*(pbest - x) + c₂*r₂*(gbest - x)
#     x' = x + v'
#
#   SCA Equation (stripped of metaphor):
#     x' = x + r₁·sin(r₂)·|r₃·gbest - x|
#     ≡  x' = x + W·(gbest - x)  where W = r₁·sin(r₂)·r₃
#
#   Key Differences:
#     ✓ PSO has velocity momentum (w*v term)
#     ✓ PSO has personal best (pbest term)
#     ✓ PSO uses simple random weights (r₁, r₂)
#     ✗ SCA lacks velocity (no memory)
#     ✗ SCA lacks personal best (no individual learning)
#     ✗ SCA uses sin(random) ≈ random but slower
# =============================================================================
