# Multi-Period Boltzmann-Metropolis Criterion (MP-BMC) Policy Configuration
# Simulated Annealing based optimization for multi-period routing.

mp_bmc:
  # Number of iterations.
  iters: 100

  # Initial temperature.
  t0: 100.0

  # Final temperature.
  tf: 0.01

  # Cooling rate.
  cooling: 0.95

  # Random seed for reproducibility.
  seed: 42

  # Whether to use VRP with Profits objectives.
  vrpp: true
