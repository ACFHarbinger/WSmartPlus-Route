# Policy Configuration

# =============================================================================
# MA-DP (Memetic Algorithm with Dual Population)
# =============================================================================
# PURPOSE:
#   Mathematically rigorous multi-population genetic algorithm that replaces
#   metaphor-based sports algorithms (VPL). It features parallel sub-
#   populations, elite-guided search, and diversity injection.
#
# REFERENCE:
#   VPL (Legacy Metaphorical Component)
# =============================================================================

ma_dp:
  custom:
    # ---------------------------------------------------------------------
    # Population Structure
    # ---------------------------------------------------------------------
    - n_islands: 10
      # Number of independent sub-populations.
      # Range: 2-8 (4 = balanced, 8 = high diversity)

    - island_size: 10
      # Number of individuals per island.
      # Range: 5-20 (10 = standard)

    - max_generations: 50
      # Total number of evolution cycles.
      # Range: 50-200 (100 = production)

    # ---------------------------------------------------------------------
    # Migration (Diversity exchange)
    # ---------------------------------------------------------------------
    - migration_interval: 10
      # Generations between migration events.
      # Range: 5-20 (10 = standard)

    - migration_size: 2
      # Number of best solutions to migrate between islands.

    # ---------------------------------------------------------------------
    # Selection (Exploitation)
    # ---------------------------------------------------------------------
    - tournament_size: 2
      # Participants in each tournament.

    - selection_pressure: 0.5
      # Beta for sigmoid win prob: P = 1/(1+exp(-beta * delta_f)).
      # Range: 0.1-1.0 (0.5 = moderate pressure)

    # ---------------------------------------------------------------------
    # Evolution (Reproduction)
    # ---------------------------------------------------------------------
    - crossover_rate: 0.8
      # Probability of applying recombination.

    - mutation_rate: 0.2
      # Probability of random perturbation.

    - alns_iterations: 100
      # Local search iterations per individual per generation.

    - elitism_size: 2
      # Best solutions preserved in each island.

    # ---------------------------------------------------------------------
    # Global Parameters
    # ---------------------------------------------------------------------
    - time_limit: 60.0
    - seed: null

    # ---------------------------------------------------------------------
    # Infrastructure Settings
    # ---------------------------------------------------------------------
    - engine: "custom"
    - must_go: ["other/mg_lookahead.yaml"]
    - post_processing: []
