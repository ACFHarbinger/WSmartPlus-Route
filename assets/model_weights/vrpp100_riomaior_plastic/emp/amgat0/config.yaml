      track_stats: false
      momentum: 0.1
      n_groups: 1
      k_lrnorm: 1.0
    activation:
      name: gelu
      param: 1.0
      threshold: 6.0
      replacement_value: 6.0
      n_params: 3
      range:
      - 0.125
      - 0.3333333333333333
    decoding:
      strategy: greedy
      beam_width: 1
      temperature: 1.0
      top_k: null
      top_p: null
      tanh_clipping: 0.0
      mask_logits: true
      multistart: false
      num_starts: 1
      select_best: false
      reward_weight: 0.0
      length_penalty_alpha: 0.0
